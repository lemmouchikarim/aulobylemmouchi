<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aulo - البحث</title>
    
    <!-- Preconnect -->
    <link rel="preconnect" href="https://aulobylemmouchi-default-rtdb.europe-west1.firebasedatabase.app">
    <link rel="preconnect" href="https://www.gstatic.com">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/l.png">
    
    <!-- Font Awesome متأخر -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></noscript>
    
    <style>
        :root {
            --primary-color: #a018cb;
            --text-color: #1a1a1a;
            --secondary-text: #757575;
            --border-color: #f0f0f0;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            direction: rtl;
        }
        
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }
        
        .logo-container img { height: 35px; cursor: pointer; }
        
        .container {
            padding: 70px 15px 80px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border-color);
            z-index: 100;
        }
        
        .nav-item {
            color: var(--secondary-text);
            font-size: 24px;
            text-decoration: none;
        }
        
        .nav-item.active { color: var(--primary-color); }
        
        .search-wrapper {
            position: sticky;
            top: 60px;
            background: white;
            padding: 15px 0;
            z-index: 99;
        }
        
        .search-input-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .search-input-container i {
            position: absolute;
            right: 15px;
            color: var(--secondary-text);
        }
        
        #user-search {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border-radius: 25px;
            background: #f1f1f1;
            border: none;
            font-size: 16px;
            font-family: inherit;
        }
        
        #user-search:focus {
            outline: none;
            border: 2px solid var(--primary-color);
            background: white;
        }
        
        .results-container {
            display: flex;
            flex-direction: column;
            margin-top: 10px;
        }
        
        .user-result-item {
            display: flex;
            align-items: center;
            padding: 12px 5px;
            border-bottom: 1px solid var(--border-color);
            text-decoration: none;
            color: inherit;
            transition: background 0.2s;
        }
        
        .user-result-item:active { background: #f9f9f9; }
        
        .result-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            margin-left: 15px;
            background: var(--border-color);
        }
        
        .result-info { flex: 1; }
        
        .result-display-name {
            font-weight: 700;
            font-size: 16px;
            display: block;
        }
        
        .result-username {
            font-size: 13px;
            color: var(--secondary-text);
        }
        
        .no-results {
            text-align: center;
            padding: 50px 20px;
            color: var(--secondary-text);
        }
        
        .no-results i {
            font-size: 50px;
            margin-bottom: 15px;
            opacity: 0.3;
        }
        
        .search-hint {
            text-align: center;
            margin-top: 30px;
            color: var(--secondary-text);
        }
        
        .loading-spinner {
            text-align: center;
            padding: 20px;
        }
        
        .loading-spinner i {
            color: var(--primary-color);
            font-size: 24px;
        }
        
        .recent-searches {
            margin-top: 20px;
        }
        
        .recent-title {
            font-size: 14px;
            color: var(--secondary-text);
            margin-bottom: 10px;
        }
        
        .recent-item {
            display: inline-block;
            background: #f1f1f1;
            padding: 5px 15px;
            border-radius: 20px;
            margin-left: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            cursor: pointer;
        }
        
        .recent-item:hover { background: #e1e1e1; }
        
        .snackbar {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="images/logo.png" alt="Aulo" onclick="location.href='main.html'">
        </div>
        <div style="font-weight: bold;">البحث</div>
        <div style="width: 35px;"></div>
    </header>
    
    <main class="container">
        <div class="search-wrapper">
            <div class="search-input-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="user-search" placeholder="ابحث عن صديق..." autocomplete="off">
            </div>
        </div>
        
        <div id="recent-searches" class="recent-searches" style="display: none;">
            <div class="recent-title">عمليات البحث الأخيرة</div>
            <div id="recent-list"></div>
        </div>
        
        <div id="search-results" class="results-container"></div>
        
        <div id="loading-spinner" class="loading-spinner" style="display: none;">
            <i class="fa-solid fa-circle-notch fa-spin"></i>
        </div>
        
        <div id="search-hint" class="search-hint">
            <i class="fa-regular fa-keyboard"></i> اكتب حرفين على الأقل للبحث
        </div>
    </main>
    
    <nav class="bottom-nav">
        <a href="main.html" class="nav-item"><i class="fa-solid fa-house"></i></a>
        <a href="find.html" class="nav-item active"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a href="post.html" class="nav-item"><i class="fa-solid fa-plus-square"></i></a>
        <a href="chatmain.html" class="nav-item"><i class="fa-solid fa-paper-plane"></i></a>
        <a href="myprofile.html" class="nav-item"><i class="fa-solid fa-user"></i></a>
    </nav>
    
    <div id="snackbar" class="snackbar"></div>
    
    <!-- Firebase -->
    <script defer src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <script defer src="js/firebase-config.js"></script>
    
    <script>
        let currentUser = null;
        let cachedUsers = [];
        let blockedUsers = new Set();
        let searchTimeout = null;
        
        const searchInput = document.getElementById('user-search');
        const resultsContainer = document.getElementById('search-results');
        const loadingSpinner = document.getElementById('loading-spinner');
        const searchHint = document.getElementById('search-hint');
        const recentSearches = document.getElementById('recent-searches');
        const recentList = document.getElementById('recent-list');
        
        function showMessage(text, isError = false) {
            const msg = document.getElementById('snackbar');
            msg.textContent = text;
            msg.style.background = isError ? '#ff3b30' : '#333';
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }
        
        // تحميل جميع المستخدمين (مرة واحدة)
        async function loadAllUsers() {
            if (cachedUsers.length > 0) return cachedUsers;
            
            try {
                const snapshot = await database.ref('users').once('value');
                const users = [];
                
                snapshot.forEach(child => {
                    const user = child.val();
                    if (user.uid !== currentUser?.uid) {
                        users.push(user);
                    }
                });
                
                cachedUsers = users;
                return users;
            } catch (error) {
                console.error('Error loading users:', error);
                return [];
            }
        }
        
        // تحميل المحظورين
        async function loadBlockedUsers() {
            if (!currentUser) return;
            try {
                const snapshot = await database.ref(`blocked/${currentUser.uid}`).once('value');
                blockedUsers.clear();
                snapshot.forEach(child => blockedUsers.add(child.key));
            } catch (error) {
                console.error('Error loading blocked users:', error);
            }
        }
        
        // البحث في المستخدمين
        function searchUsers(query) {
            if (!query || query.length < 2) return [];
            
            query = query.toLowerCase().trim();
            
            return cachedUsers.filter(user => {
                if (blockedUsers.has(user.uid)) return false;
                
                const username = (user.username || '').toLowerCase();
                const displayName = (user.displayName || '').toLowerCase();
                
                return username.includes(query) || displayName.includes(query);
            });
        }
        
        // عرض النتائج
        function displayResults(users) {
            resultsContainer.innerHTML = '';
            
            if (users.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        <i class="fa-regular fa-face-frown"></i>
                        <p>لا توجد نتائج</p>
                    </div>
                `;
                return;
            }
            
            users.forEach(user => {
                const item = document.createElement('a');
                item.href = `profile.html?id=${user.uid}`;
                item.className = 'user-result-item';
                
                item.innerHTML = `
                    <img src="${user.avatar || 'images/profile.png'}" class="result-avatar" loading="lazy">
                    <div class="result-info">
                        <span class="result-display-name">${user.displayName || user.username}</span>
                        <span class="result-username">@${user.username}</span>
                    </div>
                `;
                
                resultsContainer.appendChild(item);
            });
        }
        
        // حفظ البحث الأخير
        function saveRecentSearch(query) {
            let recents = JSON.parse(localStorage.getItem('recentSearches') || '[]');
            recents = recents.filter(q => q !== query);
            recents.unshift(query);
            recents = recents.slice(0, 5);
            localStorage.setItem('recentSearches', JSON.stringify(recents));
            showRecentSearches();
        }
        
        // عرض البحوث الأخيرة
        function showRecentSearches() {
            const recents = JSON.parse(localStorage.getItem('recentSearches') || '[]');
            
            if (recents.length === 0) {
                recentSearches.style.display = 'none';
                return;
            }
            
            recentList.innerHTML = '';
            recents.forEach(query => {
                const item = document.createElement('span');
                item.className = 'recent-item';
                item.textContent = query;
                item.onclick = () => {
                    searchInput.value = query;
                    performSearch(query);
                };
                recentList.appendChild(item);
            });
            
            recentSearches.style.display = 'block';
        }
        
        // تنفيذ البحث
        async function performSearch(query) {
            if (!query || query.length < 2) {
                searchHint.style.display = 'block';
                resultsContainer.innerHTML = '';
                return;
            }
            
            loadingSpinner.style.display = 'block';
            searchHint.style.display = 'none';
            recentSearches.style.display = 'none';
            
            setTimeout(() => {
                const results = searchUsers(query);
                loadingSpinner.style.display = 'none';
                displayResults(results);
                if (query.length >= 2) saveRecentSearch(query);
            }, 300);
        }
        
        // مستمع الإدخال
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim();
            
            if (searchTimeout) clearTimeout(searchTimeout);
            
            if (query.length < 2) {
                resultsContainer.innerHTML = '';
                searchHint.style.display = 'block';
                showRecentSearches();
                return;
            }
            
            searchTimeout = setTimeout(() => performSearch(query), 500);
        });
        
        searchInput.addEventListener('focus', () => {
            if (searchInput.value.trim().length < 2) {
                showRecentSearches();
            }
        });
        
        // التهيئة
        async function initialize() {
            loadingSpinner.style.display = 'block';
            try {
                await loadAllUsers();
                await loadBlockedUsers();
                loadingSpinner.style.display = 'none';
                showRecentSearches();
            } catch (error) {
                loadingSpinner.style.display = 'none';
            }
        }
        
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                initialize();
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
