<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
	<script src="js/mediaProcessor.js"></script>
	<script src="js/uploadManager.js"></script>
	<script src="js/cloudinaryConfig.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aulo - ملفي الشخصي</title>
    <link rel="icon" type="image/png" href="images/l.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loading-posts {
            text-align: center;
            padding: 30px;
            color: var(--secondary-text);
        }
        .loading-posts i {
            font-size: 30px;
            margin-bottom: 10px;
            color: var(--primary-color);
        }
        .empty-posts {
            text-align: center;
            padding: 50px 20px;
            color: var(--secondary-text);
        }
        .empty-posts i {
            font-size: 50px;
            margin-bottom: 15px;
            opacity: 0.3;
        }
        .edit-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            z-index: 2000;
            box-shadow: 0 5px 30px rgba(0,0,0,0.2);
            direction: rtl;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1999;
            display: none;
        }
        .edit-modal h4 {
            margin-bottom: 20px;
            color: var(--text-color);
            text-align: center;
        }
        .edit-modal input,
        .edit-modal textarea {
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            width: 100%;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .cancel-btn {
            background: none;
            border: 1px solid var(--border-color);
        }
        .delete-post-btn {
            margin-right: auto;
            color: #ff3b30;
            background: none;
            border: none;
            font-size: 18px;
            padding: 5px;
            cursor: pointer;
        }
        
        /* إحصائيات المتابعة */
        .follow-stats {
            display: flex;
            gap: 20px;
            margin: 15px 0;
            justify-content: center;
        }
        
        .stat-item {
            text-align: center;
            cursor: pointer;
        }
        
        .stat-number {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-color);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--secondary-text);
        }
        
        /* زر تغيير وضع الحساب */
        .privacy-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            padding: 10px;
            background: #f8f8f8;
            border-radius: 30px;
        }
        
        .privacy-option {
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .privacy-option.public {
            background: transparent;
            color: var(--secondary-text);
        }
        
        .privacy-option.private {
            background: transparent;
            color: var(--secondary-text);
        }
        
        .privacy-option.active {
            background: var(--primary-color);
            color: white;
        }
        
        .privacy-option i {
            margin-left: 5px;
        }
        
        /* طلبات المتابعة */
        .requests-badge {
            position: relative;
            display: inline-block;
        }
        
        .requests-count {
            position: absolute;
            top: -8px;
            left: -8px;
            background: var(--error-color);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* أزرار التحكم */
        .profile-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            margin-top: 15px;
        }
        
        .profile-actions-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        
        .btn-edit {
            flex: 1;
            background: #f0f0f0;
            color: var(--text-color);
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
        }
        
        .btn-danger {
            background: #fff1f0;
            color: var(--error-color);
            border: 1px solid var(--error-color);
        }
        
        .btn-danger i {
            color: var(--error-color);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="images/logo.png" alt="Aulo" onclick="location.href='main.html'">
        </div>
        <div style="font-weight: bold;">ملفي الشخصي</div>
        <div class="header-actions">
            <i class="fa-solid fa-right-from-bracket" onclick="logout()" style="color: var(--error-color); cursor: pointer; font-size: 20px;"></i>
        </div>
    </header>

    <main class="container">
        <section class="profile-header">
            <div class="profile-avatar-wrapper">
                <img src="images/profile.png" id="my-avatar" class="profile-avatar">

                    <i class="fa-solid fa-camera"></i>
                </label>
                <input type="file" id="avatar-input" hidden accept="image/*">
            </div>

            <div class="profile-names">
                <span id="my-display-name" class="p-display-name">جاري التحميل...</span>
                <span id="my-username" class="p-username">@...</span>
            </div>

            <p id="my-bio" class="p-bio">لا يوجد نبذة شخصية حالياً.</p>

            <!-- زر تغيير وضع الحساب -->
            <div class="privacy-toggle">
                <div id="public-option" class="privacy-option public" onclick="setPrivacy('public')">
                    <i class="fa-solid fa-globe"></i> عام
                </div>
                <div id="private-option" class="privacy-option private" onclick="setPrivacy('private')">
                    <i class="fa-solid fa-lock"></i> خاص
                </div>
            </div>

            <!-- إحصائيات المتابعة -->
            <div class="follow-stats">
                <div class="stat-item" onclick="showMyFollowers()">
                    <div class="stat-number" id="my-followers-count">0</div>
                    <div class="stat-label">متابعون</div>
                </div>
                <div class="stat-item" onclick="showMyFollowing()">
                    <div class="stat-number" id="my-following-count">0</div>
                    <div class="stat-label">يتابع</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="my-posts-count">0</div>
                    <div class="stat-label">منشورات</div>
                </div>
            </div>

            <!-- طلبات المتابعة (تظهر فقط للحساب الخاص) -->
            <div id="requests-section" style="display: none; margin: 10px 0; width: 100%;">
                <button onclick="showFollowRequests()" class="btn-edit" style="position: relative; width: 100%;">
                    <i class="fa-solid fa-user-clock"></i> طلبات المتابعة
                    <span id="requests-count" class="requests-count" style="display: none;">0</span>
                </button>
            </div>

            <div class="profile-static-info">
                <div class="info-item"><i class="fa-solid fa-cake-candles"></i> <span id="my-dob">--/--/----</span></div>
                <div class="info-item"><i id="gender-icon" class="fa-solid fa-venus-mars"></i> <span id="my-gender">...</span></div>
            </div>

            <!-- أزرار التحكم -->
            <div class="profile-actions">
                <div class="profile-actions-row">
                    <button onclick="openEditModal()" class="btn-edit">
                        <i class="fa-regular fa-pen-to-square"></i>
                        تعديل البيانات
                    </button>
                    
                    <!-- زر إدارة المحظورين -->
                    <a href="blocks.html" class="btn-edit btn-danger">
                        <i class="fa-solid fa-ban"></i>
                        المحظورين
                    </a>
                </div>
            </div>
        </section>

        <section class="user-posts-section">
            <h3 class="section-title">منشوراتي</h3>
            <div id="my-posts-feed" class="profile-feed">
                <div class="loading-posts">
                    <i class="fa-solid fa-circle-notch fa-spin"></i>
                    <p>جاري تحميل المنشورات...</p>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="main.html" class="nav-item"><i class="fa-solid fa-house"></i></a>
        <a href="find.html" class="nav-item"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a href="post.html" class="nav-item"><i class="fa-solid fa-plus-square"></i></a>
        <a href="chatmain.html" class="nav-item"><i class="fa-solid fa-paper-plane"></i></a>
        <a href="myprofile.html" class="nav-item active"><i class="fa-solid fa-user"></i></a>
    </nav>

    <!-- نافذة تعديل الملف الشخصي -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeEditModal()"></div>
    <div id="edit-modal" class="edit-modal" style="display: none;">
        <h4>تعديل الملف الشخصي</h4>
        <input type="text" id="edit-display-name" placeholder="الاسم المعروض">
        <textarea id="edit-bio" placeholder="النبذة الشخصية" rows="3"></textarea>
        <div class="modal-buttons">
            <button onclick="saveProfile()" class="btn-primary">حفظ</button>
            <button onclick="closeEditModal()" class="cancel-btn">إلغاء</button>
        </div>
    </div>

    <!-- نافذة طلبات المتابعة -->
    <div class="modal-overlay" id="requests-overlay" onclick="closeRequestsModal()" style="display: none;"></div>
    <div id="requests-modal" class="edit-modal" style="display: none; max-width: 500px;">
        <h4>طلبات المتابعة</h4>
        <div id="requests-list" style="max-height: 400px; overflow-y: auto;">
            <p style="text-align: center; color: var(--secondary-text);">لا توجد طلبات متابعة</p>
        </div>
        <div class="modal-buttons">
            <button onclick="closeRequestsModal()" class="cancel-btn">إغلاق</button>
        </div>
    </div>

    <div id="msg" class="snackbar"></div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <script src="js/ui.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZj9QplNw-VmwSl8Ijv_b6nIi4ghcHDms",
            authDomain: "aulobylemmouchi.firebaseapp.com",
            databaseURL: "https://aulobylemmouchi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aulobylemmouchi",
            storageBucket: "aulobylemmouchi.firebasestorage.app",
            messagingSenderId: "63959796567",
            appId: "1:63959796567:web:5cb2b14ca64cc01b6d4c12"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        const cloudName = "daxh9u5dc";
        const uploadPreset = "aulobylemmouchi";

        let currentUser = null;
        let currentUserData = null;
        let loadingTimeout = null;

        // ==================== دوال مساعدة ====================
        function formatDate(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            const day = date.getDate().toString().padStart(2, '0');
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const year = date.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function formatBirthdate(dateString) {
            if (!dateString) return '--/--/----';
            if (dateString.includes('-')) {
                const parts = dateString.split('-');
                if (parts.length === 3) {
                    return `${parts[2]}/${parts[1]}/${parts[0]}`;
                }
            }
            return dateString;
        }

        function startLoadingTimeout() {
            if (loadingTimeout) clearTimeout(loadingTimeout);
            
            loadingTimeout = setTimeout(() => {
                const feed = document.getElementById('my-posts-feed');
                if (feed.innerHTML.includes('loading-posts')) {
                    feed.innerHTML = `
                        <div class="empty-posts">
                            <i class="fa-solid fa-circle-exclamation"></i>
                            <p>حدث خطأ في تحميل المنشورات</p>
                            <button onclick="location.reload()" style="background: var(--primary-color); color: white; border: none; padding: 8px 20px; border-radius: 20px; margin-top: 10px; cursor: pointer;">إعادة المحاولة</button>
                        </div>
                    `;
                }
            }, 3000);
        }

        // ==================== إحصائيات المتابعة ====================
        async function loadMyFollowCounts() {
            if (!currentUser) return;
            
            try {
                const followersSnapshot = await database.ref(`followers/${currentUser.uid}`).once('value');
                const followersCount = followersSnapshot.exists() ? followersSnapshot.numChildren() : 0;
                document.getElementById('my-followers-count').textContent = followersCount;
                
                const followingSnapshot = await database.ref(`following/${currentUser.uid}`).once('value');
                const followingCount = followingSnapshot.exists() ? followingSnapshot.numChildren() : 0;
                document.getElementById('my-following-count').textContent = followingCount;
                
            } catch (error) {
                console.error('Error loading follow counts:', error);
            }
        }

        window.showMyFollowers = () => {
            Aulo.alert(`لديك ${document.getElementById('my-followers-count').textContent} متابع`);
        };

        window.showMyFollowing = () => {
            Aulo.alert(`تتابع ${document.getElementById('my-following-count').textContent} شخص`);
        };

        // ==================== نظام الخصوصية ====================
        window.setPrivacy = async (mode) => {
            if (!currentUser) return;
            
            try {
                await database.ref(`users/${currentUser.uid}`).update({
                    privacy: mode
                });
                
                currentUserData.privacy = mode;
                updatePrivacyUI(mode);
                
                Aulo.snackbar(`الحساب الآن ${mode === 'public' ? 'عام' : 'خاص'}`);
                
            } catch (error) {
                console.error('Error setting privacy:', error);
                Aulo.snackbar('حدث خطأ', true);
            }
        };

        function updatePrivacyUI(mode) {
            const publicOption = document.getElementById('public-option');
            const privateOption = document.getElementById('private-option');
            const requestsSection = document.getElementById('requests-section');
            
            if (mode === 'public') {
                publicOption.classList.add('active');
                privateOption.classList.remove('active');
                requestsSection.style.display = 'none';
            } else {
                publicOption.classList.remove('active');
                privateOption.classList.add('active');
                requestsSection.style.display = 'block';
                loadFollowRequestsCount();
            }
        }

        // ==================== طلبات المتابعة ====================
        async function loadFollowRequestsCount() {
            if (!currentUser) return;
            
            try {
                const snapshot = await database.ref(`followRequests/${currentUser.uid}`).once('value');
                const count = snapshot.exists() ? snapshot.numChildren() : 0;
                
                const requestsCount = document.getElementById('requests-count');
                if (count > 0) {
                    requestsCount.textContent = count;
                    requestsCount.style.display = 'flex';
                } else {
                    requestsCount.style.display = 'none';
                }
            } catch (error) {
                console.error('Error loading requests count:', error);
            }
        }

        window.showFollowRequests = async () => {
            if (!currentUser) return;
            
            try {
                const snapshot = await database.ref(`followRequests/${currentUser.uid}`).once('value');
                const requests = [];
                
                snapshot.forEach((child) => {
                    requests.push({ id: child.key, ...child.val() });
                });
                
                const requestsList = document.getElementById('requests-list');
                
                if (requests.length === 0) {
                    requestsList.innerHTML = '<p style="text-align: center; color: var(--secondary-text);">لا توجد طلبات متابعة</p>';
                } else {
                    requestsList.innerHTML = '';
                    
                    for (const req of requests) {
                        const userSnapshot = await database.ref(`users/${req.userId}`).once('value');
                        const userData = userSnapshot.val();
                        
                        const reqDiv = document.createElement('div');
                        reqDiv.style.cssText = `
                            display: flex;
                            align-items: center;
                            padding: 10px;
                            border-bottom: 1px solid var(--border-color);
                            gap: 10px;
                        `;
                        
                        reqDiv.innerHTML = `
                            <img src="${userData.avatar || 'images/profile.png'}" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
                            <div style="flex: 1;">
                                <div style="font-weight: 600;">${userData.displayName || userData.username}</div>
                                <div style="font-size: 12px; color: var(--secondary-text);">@${userData.username}</div>
                            </div>
                            <div style="display: flex; gap: 5px;">
                                <button onclick="acceptFollowRequest('${req.userId}')" style="background: var(--primary-color); color: white; border: none; padding: 5px 15px; border-radius: 20px; cursor: pointer;">قبول</button>
                                <button onclick="rejectFollowRequest('${req.userId}')" style="background: #ff3b30; color: white; border: none; padding: 5px 15px; border-radius: 20px; cursor: pointer;">رفض</button>
                            </div>
                        `;
                        
                        requestsList.appendChild(reqDiv);
                    }
                }
                
                document.getElementById('requests-modal').style.display = 'block';
                document.getElementById('requests-overlay').style.display = 'block';
                
            } catch (error) {
                console.error('Error loading requests:', error);
                Aulo.snackbar('حدث خطأ', true);
            }
        };

        window.acceptFollowRequest = async (userId) => {
            try {
                await database.ref(`followers/${currentUser.uid}/${userId}`).set({
                    uid: userId,
                    timestamp: Date.now()
                });
                
                await database.ref(`following/${userId}/${currentUser.uid}`).set({
                    uid: currentUser.uid,
                    timestamp: Date.now()
                });
                
                await database.ref(`followRequests/${currentUser.uid}/${userId}`).remove();
                
                await database.ref(`notifications/${userId}`).push({
                    type: 'follow_accepted',
                    userId: currentUser.uid,
                    timestamp: Date.now(),
                    read: false
                });
                
                Aulo.snackbar('تم قبول طلب المتابعة');
                showFollowRequests();
                loadFollowRequestsCount();
                loadMyFollowCounts();
                
            } catch (error) {
                console.error('Error accepting request:', error);
                Aulo.snackbar('حدث خطأ', true);
            }
        };

        window.rejectFollowRequest = async (userId) => {
            try {
                await database.ref(`followRequests/${currentUser.uid}/${userId}`).remove();
                Aulo.snackbar('تم رفض الطلب');
                showFollowRequests();
                loadFollowRequestsCount();
            } catch (error) {
                console.error('Error rejecting request:', error);
                Aulo.snackbar('حدث خطأ', true);
            }
        };

        window.closeRequestsModal = () => {
            document.getElementById('requests-modal').style.display = 'none';
            document.getElementById('requests-overlay').style.display = 'none';
        };

        // ==================== تحميل الملف الشخصي ====================
        async function loadMyProfile() {
            const user = auth.currentUser;
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            currentUser = user;
            startLoadingTimeout();

            try {
                const userSnapshot = await database.ref(`users/${user.uid}`).once('value');
                currentUserData = userSnapshot.val();

                if (!currentUserData) {
                    Aulo.snackbar('بيانات المستخدم غير موجودة', { type: 'error' });
                    return;
                }

                document.getElementById('my-avatar').src = currentUserData.avatar || 'images/profile.png';
                document.getElementById('my-display-name').textContent = 
                    currentUserData.displayName || currentUserData.username || 'مستخدم';
                document.getElementById('my-username').textContent = 
                    `@${currentUserData.username || 'username'}`;
                document.getElementById('my-bio').textContent = 
                    currentUserData.bio || 'لا يوجد نبذة شخصية حالياً.';
                document.getElementById('my-dob').textContent = 
                    formatBirthdate(currentUserData.birthdate);
                document.getElementById('my-posts-count').textContent = currentUserData.postsCount || 0;
                
                const genderSpan = document.getElementById('my-gender');
                const genderIcon = document.getElementById('gender-icon');
                
                if (currentUserData.gender === 'male') {
                    genderSpan.textContent = 'ذكر';
                    genderIcon.className = 'fa-solid fa-mars';
                } else if (currentUserData.gender === 'female') {
                    genderSpan.textContent = 'أنثى';
                    genderIcon.className = 'fa-solid fa-venus';
                } else {
                    genderSpan.textContent = 'غير محدد';
                }

                // تحديث واجهة الخصوصية
                if (currentUserData.privacy) {
                    updatePrivacyUI(currentUserData.privacy);
                } else {
                    // افتراضي: عام
                    await setPrivacy('public');
                }

                await loadMyFollowCounts();
                await loadMyPosts();

                document.getElementById('edit-display-name').value = 
                    currentUserData.displayName || currentUserData.username || '';
                document.getElementById('edit-bio').value = 
                    currentUserData.bio || '';

            } catch (error) {
                console.error('Error loading profile:', error);
                Aulo.snackbar('خطأ في تحميل الملف الشخصي', { type: 'error' });
            }
        }

        // ==================== تحميل منشوراتي ====================
        async function loadMyPosts() {
            const feed = document.getElementById('my-posts-feed');
            
            try {
                const postsSnapshot = await database.ref('posts')
                    .orderByChild('userId')
                    .equalTo(currentUser.uid)
                    .limitToLast(10)
                    .once('value');

                const posts = [];
                postsSnapshot.forEach((child) => {
                    posts.push({ id: child.key, ...child.val() });
                });

                posts.reverse();

                if (loadingTimeout) {
                    clearTimeout(loadingTimeout);
                    loadingTimeout = null;
                }

                if (posts.length === 0) {
                    feed.innerHTML = `
                        <div class="empty-posts">
                            <i class="fa-regular fa-images"></i>
                            <p>لا توجد منشورات بعد</p>
                            <a href="post.html" style="color: var(--primary-color); text-decoration: none;">أنشر أول منشور الآن</a>
                        </div>
                    `;
                    return;
                }

                feed.innerHTML = '';

                for (const post of posts) {
                    const postElement = createPostElement(post);
                    feed.appendChild(postElement);
                }

            } catch (error) {
                console.error('Error loading posts:', error);
                
                if (loadingTimeout) {
                    clearTimeout(loadingTimeout);
                    loadingTimeout = null;
                }
                
                feed.innerHTML = `
                    <div class="empty-posts">
                        <i class="fa-solid fa-circle-exclamation"></i>
                        <p>خطأ في تحميل المنشورات</p>
                        <button onclick="loadMyPosts()" style="background: var(--primary-color); color: white; border: none; padding: 8px 20px; border-radius: 20px; margin-top: 10px; cursor: pointer;">إعادة المحاولة</button>
                    </div>
                `;
            }
        }

        function createPostElement(post) {
            const postDiv = document.createElement('div');
            postDiv.className = 'post-card';
            postDiv.dataset.postId = post.id;

            const contentHTML = post.text ? `<div class="post-content">${post.text}</div>` : '';

            let mediaHTML = '';
            if (post.media && post.media.length > 0) {
                const gridClass = `media-grid-${Math.min(post.media.length, 5)}`;
                mediaHTML = `<div class="post-media-container ${gridClass}">`;
                
                post.media.forEach(media => {
                    if (media.type === 'image') {
                        mediaHTML += `<img src="${media.url}" alt="صورة" loading="lazy">`;
                    } else if (media.type === 'video') {
                        mediaHTML += `<video src="${media.url}" controls preload="metadata"></video>`;
                    }
                });
                
                mediaHTML += '</div>';
            }

            postDiv.innerHTML = `
                <div class="post-header">
                    <img src="${currentUserData.avatar || 'images/profile.png'}" class="user-avatar">
                    <div class="post-info">
                        <span class="display-name">${currentUserData.displayName || currentUserData.username}</span>
                        <span class="post-time">${formatDate(post.timestamp)}</span>
                    </div>
                    <button class="delete-post-btn" onclick="deletePost('${post.id}', this)">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
                ${contentHTML}
                ${mediaHTML}
                <div class="post-actions">
                    <button class="like-btn active" disabled>
                        <i class="fa-solid fa-heart"></i>
                    </button>
                    <span class="like-count">${post.likes || 0}</span>
                </div>
            `;

            return postDiv;
        }

        window.deletePost = async (postId, btn) => {
            const confirmed = await Aulo.confirm('هل أنت متأكد من حذف هذا المنشور؟');
            if (!confirmed) return;

            try {
                await database.ref(`posts/${postId}`).remove();
                await database.ref(`likes/${postId}`).remove();
                
                btn.closest('.post-card').remove();
                Aulo.snackbar('تم حذف المنشور', { type: 'success' });
                
            } catch (error) {
                console.error('Error deleting post:', error);
                Aulo.snackbar('خطأ في حذف المنشور', { type: 'error' });
            }
        };

        // ==================== تغيير الصورة الشخصية ====================
        document.getElementById('avatar-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (file.size > 5 * 1024 * 1024) {
                Aulo.snackbar('الصورة كبيرة جداً (الحد الأقصى 5 ميجابايت)', { type: 'error' });
                return;
            }

            try {
                Aulo.snackbar('جاري رفع الصورة...');
                
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', uploadPreset);
                formData.append('folder', 'aulobylemmouchi/avatars');
                
                const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                await database.ref(`users/${currentUser.uid}`).update({
                    avatar: data.secure_url
                });
                
                document.getElementById('my-avatar').src = data.secure_url;
                Aulo.snackbar('تم تحديث الصورة الشخصية', { type: 'success' });
                
            } catch (error) {
                console.error('Error uploading avatar:', error);
                Aulo.snackbar('خطأ في رفع الصورة', { type: 'error' });
            }
        });

        // ==================== تعديل الملف الشخصي ====================
        window.openEditModal = () => {
            document.getElementById('edit-modal').style.display = 'block';
            document.getElementById('modal-overlay').style.display = 'block';
        };

        window.closeEditModal = () => {
            document.getElementById('edit-modal').style.display = 'none';
            document.getElementById('modal-overlay').style.display = 'none';
        };

        window.saveProfile = async () => {
            const displayName = document.getElementById('edit-display-name').value.trim();
            const bio = document.getElementById('edit-bio').value.trim();

            if (!displayName) {
                Aulo.snackbar('الرجاء إدخال الاسم المعروض', { type: 'error' });
                return;
            }

            try {
                await database.ref(`users/${currentUser.uid}`).update({
                    displayName: displayName,
                    bio: bio
                });

                document.getElementById('my-display-name').textContent = displayName;
                document.getElementById('my-bio').textContent = bio || 'لا يوجد نبذة شخصية حالياً.';
                
                closeEditModal();
                Aulo.snackbar('تم تحديث الملف الشخصي', { type: 'success' });
                
            } catch (error) {
                console.error('Error updating profile:', error);
                Aulo.snackbar('خطأ في تحديث الملف', { type: 'error' });
            }
        };

        // ==================== تسجيل الخروج ====================
        window.logout = async () => {
            try {
                if (currentUser) {
                    await database.ref(`users/${currentUser.uid}`).update({
                        online: false,
                        lastSeen: Date.now()
                    });
                }
                await auth.signOut();
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Logout error:', error);
                Aulo.snackbar('خطأ في تسجيل الخروج', { type: 'error' });
            }
        };

        // ==================== التحقق من حالة المصادقة ====================
        auth.onAuthStateChanged((user) => {
            if (user) {
                loadMyProfile();
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
	<script>
	if ('serviceWorker' in navigator) {
		navigator.serviceWorker.register('/firebase-messaging-sw.js');
	}
	</script>
</body>
