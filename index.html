<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aulo - تسجيل الدخول</title>
    <link rel="icon" type="image/png" href="images/l.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* تنسيقات خاصة بصفحة الدخول */
        .auth-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        .auth-logo {
            width: 120px;
            margin-bottom: 30px;
        }
        .auth-form {
            width: 100%;
            max-width: 350px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .auth-footer {
            margin-top: 25px;
            font-size: 14px;
            color: var(--secondary-text);
            text-align: center;
        }
        .toggle-auth {
            color: var(--primary-color);
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
        }
        
        /* تنسيق حقول التسجيل الإضافية */
        .extra-fields {
            display: none;
            margin-top: 10px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .gender-options {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }
        
        .gender-option {
            flex: 1;
            text-align: center;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .gender-option.selected {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        
        .gender-option i {
            display: block;
            font-size: 20px;
            margin-bottom: 5px;
        }
        
        .profile-upload {
            border: 2px dashed var(--border-color);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 15px;
        }
        
        .profile-upload i {
            font-size: 30px;
            color: var(--secondary-text);
            margin-bottom: 5px;
        }
        
        #avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin: 10px auto;
            display: none;
        }
        
        .date-input {
            direction: ltr;
            text-align: right;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* تنسيق الموافقة على الشروط */
        .terms-checkbox {
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }
        
        .terms-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }
        
        .terms-checkbox label {
            cursor: pointer;
            color: var(--text-color);
        }
        
        .terms-checkbox a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
        
        .terms-checkbox a:hover {
            text-decoration: underline;
        }
        
        .terms-error {
            color: var(--error-color);
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .terms-links {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <img src="images/logo.png" alt="Aulo Logo" class="auth-logo">

        <div class="auth-form" id="login-section">
            <h2 style="margin-bottom: 20px; text-align: center;">مرحباً بك في Aulo</h2>
            
            <!-- حقل اسم المستخدم (إلزامي) -->
            <div class="input-group">
                <input type="text" id="username" placeholder="اسم المستخدم (username)" autocomplete="off">
            </div>

            <!-- حقل كلمة السر (إلزامي) -->
            <div class="input-group">
                <input type="password" id="password" placeholder="كلمة السر">
            </div>

            <!-- الحقول الإضافية للتسجيل (تظهر فقط في وضع إنشاء الحساب) -->
            <div class="extra-fields" id="signup-fields">
                <!-- تاريخ الميلاد (إلزامي) -->
                <div class="input-group">
                    <input type="date" id="birthdate" class="date-input">
                </div>

                <!-- الجنس (إلزامي) -->
                <div class="input-group">
                    <label style="font-size: 14px; color: var(--secondary-text); display: block; margin-bottom: 5px;">الجنس</label>
                    <div class="gender-options">
                        <div class="gender-option" onclick="selectGender('male')" id="gender-male">
                            <i class="fa-solid fa-mars"></i>
                            <span>ذكر</span>
                        </div>
                        <div class="gender-option" onclick="selectGender('female')" id="gender-female">
                            <i class="fa-solid fa-venus"></i>
                            <span>أنثى</span>
                        </div>
                    </div>
                </div>

                <!-- الاسم المعروض (اختياري) -->
                <div class="input-group">
                    <input type="text" id="displayName" placeholder="الاسم المعروض (اختياري)">
                </div>

                <!-- السيرة الذاتية (اختياري) -->
                <div class="input-group">
                    <textarea id="bio" placeholder="نبذة عنك (اختياري)" rows="2"></textarea>
                </div>

                <!-- الصورة الشخصية (اختياري) -->
                <div class="input-group">
                    <label for="avatar-upload" class="profile-upload">
                        <i class="fa-solid fa-camera"></i>
                        <div>إضافة صورة شخصية</div>
                        <span>اختياري</span>
                    </label>
                    <input type="file" id="avatar-upload" hidden accept="image/*">
                    <img id="avatar-preview" src="#" alt="معاينة الصورة">
                </div>
                
                <!-- الموافقة على الشروط (إلزامي) -->
                <div class="terms-checkbox">
                    <input type="checkbox" id="terms-agree">
                    <label for="terms-agree">
                        أوافق على 
                        <span class="terms-links">
                            <a href="terms.html" target="_blank">شروط الاستخدام</a>
                            و
                            <a href="privacy.html" target="_blank">سياسة الخصوصية</a>
                            و
                            <a href="disclaimer.html" target="_blank">الإخلاء القانوني</a>
                        </span>
                    </label>
                </div>
                <div id="terms-error" class="terms-error">يجب الموافقة على الشروط وسياسة الخصوصية</div>
            </div>

            <button id="auth-btn" class="btn-primary" disabled>
                <span id="btn-text">دخول</span>
                <span id="btn-spinner" class="loading-spinner" style="display: none;"></span>
            </button>

            <div class="auth-footer">
                ليس لديك حساب؟ <span class="toggle-auth" onclick="toggleAuth()">إنشاء حساب جديد</span>
            </div>
        </div>
    </div>

    <div id="msg" class="snackbar"></div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <script src="js/ui.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZj9QplNw-VmwSl8Ijv_b6nIi4ghcHDms",
            authDomain: "aulobylemmouchi.firebaseapp.com",
            databaseURL: "https://aulobylemmouchi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aulobylemmouchi",
            storageBucket: "aulobylemmouchi.firebasestorage.app",
            messagingSenderId: "63959796567",
            appId: "1:63959796567:web:5cb2b14ca64cc01b6d4c12"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        const cloudName = "daxh9u5dc";
        const uploadPreset = "aulobylemmouchi";

        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const birthdateInput = document.getElementById('birthdate');
        const authBtn = document.getElementById('auth-btn');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');
        const signupFields = document.getElementById('signup-fields');
        const avatarUpload = document.getElementById('avatar-upload');
        const avatarPreview = document.getElementById('avatar-preview');
        const termsCheckbox = document.getElementById('terms-agree');
        const termsError = document.getElementById('terms-error');
        
        let selectedGender = '';
        let avatarFile = null;
        let isSignupMode = false;

        function setLoading(isLoading) {
            authBtn.disabled = isLoading;
            btnText.style.display = isLoading ? 'none' : 'inline';
            btnSpinner.style.display = isLoading ? 'inline-block' : 'none';
        }

        avatarUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    Aulo.snackbar('الصورة كبيرة جداً (الحد الأقصى 5 ميجابايت)', { type: 'error' });
                    return;
                }
                avatarFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    avatarPreview.src = e.target.result;
                    avatarPreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        window.selectGender = (gender) => {
            selectedGender = gender;
            document.querySelectorAll('.gender-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            document.getElementById(`gender-${gender}`).classList.add('selected');
            validateInputs();
        };

        function validateInputs() {
            const userValue = usernameInput.value.trim();
            const passValue = passwordInput.value.trim();
            
            if (!isSignupMode) {
                // وضع تسجيل الدخول
                authBtn.disabled = !(userValue.length >= 3 && passValue.length >= 6);
            } else {
                // وضع إنشاء حساب
                const birthdateValue = birthdateInput.value;
                const isBirthdateValid = birthdateValue.length > 0;
                const isGenderValid = selectedGender !== '';
                const isTermsChecked = termsCheckbox.checked;
                
                authBtn.disabled = !(userValue.length >= 3 && 
                                    passValue.length >= 6 && 
                                    isBirthdateValid && 
                                    isGenderValid && 
                                    isTermsChecked);
                
                // إظهار/إخفاء رسالة الخطأ
                termsError.style.display = isTermsChecked ? 'none' : 'block';
            }
        }

        usernameInput.addEventListener('input', validateInputs);
        passwordInput.addEventListener('input', validateInputs);
        birthdateInput.addEventListener('change', validateInputs);
        termsCheckbox.addEventListener('change', validateInputs);

        window.toggleAuth = () => {
            isSignupMode = !isSignupMode;

            if (!isSignupMode) {
                btnText.innerText = 'دخول';
                document.querySelector('h2').innerText = 'مرحباً بك في Aulo';
                document.querySelector('.auth-footer').innerHTML = 'ليس لديك حساب؟ <span class="toggle-auth" onclick="toggleAuth()">إنشاء حساب جديد</span>';
                signupFields.style.display = 'none';
            } else {
                btnText.innerText = 'إنشاء الحساب';
                document.querySelector('h2').innerText = 'انضم إلى Aulo';
                document.querySelector('.auth-footer').innerHTML = 'لديك حساب بالفعل؟ <span class="toggle-auth" onclick="toggleAuth()">تسجيل الدخول</span>';
                signupFields.style.display = 'block';
            }
            
            selectedGender = '';
            document.querySelectorAll('.gender-option').forEach(opt => opt.classList.remove('selected'));
            birthdateInput.value = '';
            document.getElementById('displayName').value = '';
            document.getElementById('bio').value = '';
            avatarFile = null;
            avatarPreview.style.display = 'none';
            avatarPreview.src = '#';
            avatarUpload.value = '';
            termsCheckbox.checked = false;
            termsError.style.display = 'none';
            
            validateInputs();
        };

        async function uploadToCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', uploadPreset);
            formData.append('folder', 'aulobylemmouchi/avatars');
            
            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) throw new Error('فشل الرفع');
                const data = await response.json();
                return data.secure_url;
            } catch (error) {
                console.error('Upload error:', error);
                return null;
            }
        }

        async function handleLogin(username, password) {
            try {
                setLoading(true);
                
                const usersRef = database.ref('users');
                const snapshot = await usersRef.orderByChild('username').equalTo(username).once('value');
                
                let userEmail = null;
                let userId = null;
                
                snapshot.forEach((child) => {
                    userEmail = child.val().email;
                    userId = child.key;
                });
                
                if (!userEmail) {
                    throw new Error('اسم المستخدم غير موجود');
                }
                
                await auth.signInWithEmailAndPassword(userEmail, password);
                
                if (userId) {
                    await database.ref(`users/${userId}`).update({
                        lastSeen: Date.now(),
                        online: true
                    });
                }
                
                Aulo.snackbar('تم تسجيل الدخول بنجاح', { type: 'success' });
                setTimeout(() => {
                    window.location.href = 'main.html';
                }, 1000);
                
            } catch (error) {
                console.error('Login error:', error);
                Aulo.snackbar(error.message, { type: 'error' });
                setLoading(false);
            }
        }

        async function handleSignup(username, password, birthdate, gender, displayName, bio, avatarFile) {
            try {
                setLoading(true);
                
                const usersRef = database.ref('users');
                const snapshot = await usersRef.orderByChild('username').equalTo(username).once('value');
                
                if (snapshot.exists()) {
                    throw new Error('اسم المستخدم موجود بالفعل');
                }
                
                const email = `${username}@${username}.app`;
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                let avatarUrl = 'images/profile.png';
                if (avatarFile) {
                    const uploadedUrl = await uploadToCloudinary(avatarFile);
                    if (uploadedUrl) avatarUrl = uploadedUrl;
                }
                
                const userData = {
                    uid: user.uid,
                    username: username,
                    email: email,
                    displayName: displayName || username,
                    bio: bio || '',
                    gender: gender,
                    birthdate: birthdate,
                    avatar: avatarUrl,
                    createdAt: Date.now(),
                    lastSeen: Date.now(),
                    online: true,
                    postsCount: 0,
                    likesCount: 0,
                    termsAgreed: true,
                    termsAgreedAt: Date.now()
                };
                
                await database.ref(`users/${user.uid}`).set(userData);
                
                Aulo.snackbar('تم إنشاء الحساب بنجاح', { type: 'success' });
                setTimeout(() => {
                    window.location.href = 'main.html';
                }, 1000);
                
            } catch (error) {
                console.error('Signup error:', error);
                Aulo.snackbar(error.message, { type: 'error' });
                setLoading(false);
            }
        }

        document.getElementById('auth-btn').addEventListener('click', async () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            
            if (!username || !password) {
                Aulo.snackbar('الرجاء إدخال جميع الحقول المطلوبة', { type: 'error' });
                return;
            }
            
            if (!isSignupMode) {
                await handleLogin(username, password);
            } else {
                const birthdate = birthdateInput.value;
                if (!birthdate) {
                    Aulo.snackbar('الرجاء إدخال تاريخ الميلاد', { type: 'error' });
                    return;
                }
                
                if (!selectedGender) {
                    Aulo.snackbar('الرجاء اختيار الجنس', { type: 'error' });
                    return;
                }
                
                if (!termsCheckbox.checked) {
                    Aulo.snackbar('يجب الموافقة على الشروط وسياسة الخصوصية', { type: 'error' });
                    return;
                }
                
                const displayName = document.getElementById('displayName').value.trim();
                const bio = document.getElementById('bio').value.trim();
                
                await handleSignup(username, password, birthdate, selectedGender, displayName, bio, avatarFile);
            }
        });

        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'main.html';
            }
        });
    </script>
</body>
</html>
