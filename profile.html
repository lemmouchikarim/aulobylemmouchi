<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" type="image/png" href="images/l.png">
    <link rel="stylesheet" href="css/style.css">
	<!-- أيقونات بأحجام مختلفة -->
	<link rel="icon" type="image/png" sizes="16x16" href="images/l.png">
	<link rel="icon" type="image/png" sizes="32x32" href="images/l.png">
	<link rel="apple-touch-icon" href="images/l.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aulo - ملف شخصي</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loading-posts {
            text-align: center;
            padding: 30px;
            color: var(--secondary-text);
        }
        .loading-posts i {
            font-size: 30px;
            margin-bottom: 10px;
            color: var(--primary-color);
        }
        .empty-posts {
            text-align: center;
            padding: 50px 20px;
            color: var(--secondary-text);
        }
        .empty-posts i {
            font-size: 50px;
            margin-bottom: 15px;
            opacity: 0.3;
        }
        .error-container {
            text-align: center;
            padding: 50px 20px;
        }
        .error-container i {
            font-size: 60px;
            color: var(--error-color);
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="images/logo.png" alt="Aulo" onclick="location.href='main.html'">
        </div>
        <div id="header-username" style="font-weight: bold; font-size: 14px;">الملف الشخصي</div>
        <div class="header-actions" onclick="goBack()">
            <i class="fa-solid fa-chevron-left" style="font-size: 20px; color: var(--text-color); cursor: pointer;"></i>
        </div>
    </header>

    <main class="container">
        <section class="profile-header" id="profile-section" style="display: none;">
            <div class="profile-avatar-wrapper">
                <img src="images/profile.png" id="user-avatar" class="profile-avatar">
            </div>

            <div class="profile-names">
                <span id="user-display-name" class="p-display-name">جاري التحميل...</span>
                <span id="user-username" class="p-username">@...</span>
            </div>

            <p id="user-bio" class="p-bio">...</p>

            <div class="profile-static-info">
                <div class="info-item"><i class="fa-solid fa-cake-candles"></i> <span id="user-dob">--/--/----</span></div>
                <div class="info-item"><i id="user-gender-icon" class="fa-solid fa-venus-mars"></i> <span id="user-gender">...</span></div>
            </div>

            <div class="profile-actions">
                <button id="start-chat-btn" class="btn-chat" onclick="startChat()">
                    <i class="fa-solid fa-paper-plane" style="margin-left: 8px;"></i> دردش معه
                </button>
            </div>
        </section>

        <section class="user-posts-section" id="posts-section" style="display: none;">
            <h3 class="section-title">المنشورات</h3>
            <div id="user-posts-feed" class="profile-feed">
                <div class="loading-posts">
                    <i class="fa-solid fa-circle-notch fa-spin"></i>
                    <p>جاري تحميل المنشورات...</p>
                </div>
            </div>
        </section>

        <div id="error-container" class="error-container" style="display: none;">
            <i class="fa-solid fa-circle-exclamation"></i>
            <h3>المستخدم غير موجود</h3>
            <p>لم يتم العثور على الملف الشخصي المطلوب</p>
            <a href="javascript:history.back()" class="btn-primary" style="display: inline-block; width: auto; padding: 10px 25px;">العودة</a>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="main.html" class="nav-item"><i class="fa-solid fa-house"></i></a>
        <a href="find.html" class="nav-item"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a href="post.html" class="nav-item"><i class="fa-solid fa-plus-square"></i></a>
        <a href="chatmain.html" class="nav-item"><i class="fa-solid fa-paper-plane"></i></a>
        <a href="myprofile.html" class="nav-item"><i class="fa-solid fa-user"></i></a>
    </nav>

    <div id="msg" class="snackbar"></div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <script src="js/ui.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZj9QplNw-VmwSl8Ijv_b6nIi4ghcHDms",
            authDomain: "aulobylemmouchi.firebaseapp.com",
            databaseURL: "https://aulobylemmouchi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aulobylemmouchi",
            storageBucket: "aulobylemmouchi.firebasestorage.app",
            messagingSenderId: "63959796567",
            appId: "1:63959796567:web:5cb2b14ca64cc01b6d4c12"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        let currentUser = null;
        let targetUserId = null;
        let targetUserData = null;

        function formatDate(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            const day = date.getDate().toString().padStart(2, '0');
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const year = date.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function formatBirthdate(dateString) {
            if (!dateString) return '--/--/----';
            if (dateString.includes('-')) {
                const parts = dateString.split('-');
                if (parts.length === 3) {
                    return `${parts[2]}/${parts[1]}/${parts[0]}`;
                }
            }
            return dateString;
        }

        function goBack() {
            window.history.back();
        }

        function getUserIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        async function loadProfile() {
            const user = auth.currentUser;
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            currentUser = user;
            targetUserId = getUserIdFromUrl();

            if (!targetUserId) {
                showError('لم يتم تحديد مستخدم');
                return;
            }

            if (targetUserId === user.uid) {
                window.location.href = 'myprofile.html';
                return;
            }

            try {
                const userSnapshot = await database.ref(`users/${targetUserId}`).once('value');
                targetUserData = userSnapshot.val();

                if (!targetUserData) {
                    showError('المستخدم غير موجود');
                    return;
                }

                document.getElementById('profile-section').style.display = 'flex';
                document.getElementById('posts-section').style.display = 'block';
                document.getElementById('error-container').style.display = 'none';

                document.getElementById('header-username').textContent = 
                    targetUserData.displayName || targetUserData.username || 'الملف الشخصي';
                document.getElementById('user-avatar').src = targetUserData.avatar || 'images/profile.png';
                document.getElementById('user-display-name').textContent = 
                    targetUserData.displayName || targetUserData.username || 'مستخدم';
                document.getElementById('user-username').textContent = 
                    `@${targetUserData.username || 'username'}`;
                document.getElementById('user-bio').textContent = 
                    targetUserData.bio || 'لا يوجد نبذة شخصية';
                document.getElementById('user-dob').textContent = 
                    formatBirthdate(targetUserData.birthdate);
                
                const genderSpan = document.getElementById('user-gender');
                const genderIcon = document.getElementById('user-gender-icon');
                
                if (targetUserData.gender === 'male') {
                    genderSpan.textContent = 'ذكر';
                    genderIcon.className = 'fa-solid fa-mars';
                } else if (targetUserData.gender === 'female') {
                    genderSpan.textContent = 'أنثى';
                    genderIcon.className = 'fa-solid fa-venus';
                } else {
                    genderSpan.textContent = 'غير محدد';
                }

                loadUserPosts();

            } catch (error) {
                console.error('Error loading profile:', error);
                showError('خطأ في تحميل الملف الشخصي');
            }
        }

        function showError(message) {
            document.getElementById('profile-section').style.display = 'none';
            document.getElementById('posts-section').style.display = 'none';
            document.getElementById('error-container').style.display = 'block';
            Aulo.snackbar(message, { type: 'error' });
        }

        async function loadUserPosts() {
            const feed = document.getElementById('user-posts-feed');
            
            try {
                const postsSnapshot = await database.ref('posts')
                    .orderByChild('userId')
                    .equalTo(targetUserId)
                    .limitToLast(10)
                    .once('value');

                const posts = [];
                postsSnapshot.forEach((child) => {
                    posts.push({ id: child.key, ...child.val() });
                });

                posts.reverse();

                if (posts.length === 0) {
                    feed.innerHTML = `
                        <div class="empty-posts">
                            <i class="fa-regular fa-images"></i>
                            <p>لا توجد منشورات</p>
                        </div>
                    `;
                    return;
                }

                feed.innerHTML = '';

                for (const post of posts) {
                    const postElement = createPostElement(post);
                    feed.appendChild(postElement);
                }

            } catch (error) {
                console.error('Error loading posts:', error);
                feed.innerHTML = `
                    <div class="empty-posts">
                        <i class="fa-solid fa-circle-exclamation"></i>
                        <p>خطأ في تحميل المنشورات</p>
                    </div>
                `;
            }
        }

        function createPostElement(post) {
            const postDiv = document.createElement('div');
            postDiv.className = 'post-card';

            const contentHTML = post.text ? `<div class="post-content">${post.text}</div>` : '';

            let mediaHTML = '';
            if (post.media && post.media.length > 0) {
                const gridClass = `media-grid-${Math.min(post.media.length, 5)}`;
                mediaHTML = `<div class="post-media-container ${gridClass}">`;
                
                post.media.forEach(media => {
                    if (media.type === 'image') {
                        mediaHTML += `<img src="${media.url}" alt="صورة" loading="lazy">`;
                    } else if (media.type === 'video') {
                        mediaHTML += `<video src="${media.url}" controls preload="metadata"></video>`;
                    }
                });
                
                mediaHTML += '</div>';
            }

            postDiv.innerHTML = `
                <div class="post-header" onclick="location.href='profile.html?id=${post.userId}'">
                    <img src="${targetUserData.avatar || 'images/profile.png'}" class="user-avatar">
                    <div class="post-info">
                        <span class="display-name">${targetUserData.displayName || targetUserData.username}</span>
                        <span class="post-time">${formatDate(post.timestamp)}</span>
                    </div>
                </div>
                ${contentHTML}
                ${mediaHTML}
                <div class="post-actions">
                    <button class="like-btn" onclick="toggleLike('${post.id}', this)">
                        <i class="fa-regular fa-heart"></i>
                    </button>
                    <span class="like-count">${post.likes || 0}</span>
                </div>
            `;

            return postDiv;
        }

        window.toggleLike = async (postId, btn) => {
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const likeRef = database.ref(`likes/${postId}/${currentUser.uid}`);
                const snapshot = await likeRef.once('value');
                const postRef = database.ref(`posts/${postId}`);
                const postSnapshot = await postRef.once('value');
                const post = postSnapshot.val();
                
                if (snapshot.exists()) {
                    await likeRef.remove();
                    await postRef.update({ likes: (post.likes || 1) - 1 });
                    btn.classList.remove('active');
                    btn.querySelector('i').className = 'fa-regular fa-heart';
                } else {
                    await likeRef.set({ userId: currentUser.uid, timestamp: Date.now() });
                    await postRef.update({ likes: (post.likes || 0) + 1 });
                    btn.classList.add('active');
                    btn.querySelector('i').className = 'fa-solid fa-heart';
                }
                
                const likeCountSpan = btn.nextElementSibling;
                likeCountSpan.textContent = parseInt(likeCountSpan.textContent) + (snapshot.exists() ? -1 : 1);
                
            } catch (error) {
                console.error('Error toggling like:', error);
                Aulo.snackbar('حدث خطأ', { type: 'error' });
            }
        };

        window.startChat = () => {
            if (targetUserId) {
                window.location.href = `chat.html?id=${targetUserId}`;
            }
        };

        auth.onAuthStateChanged((user) => {
            if (user) {
                loadProfile();
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
