<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" type="image/png" href="images/l.png">
    <link rel="stylesheet" href="css/style.css">
	<!-- أيقونات بأحجام مختلفة -->
	<link rel="icon" type="image/png" sizes="16x16" href="images/l.png">
	<link rel="icon" type="image/png" sizes="32x32" href="images/l.png">
	<link rel="apple-touch-icon" href="images/l.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aulo - الدردشة</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .chat-container {
            display: flex;
            flex-direction: column;
            padding: 70px 10px 90px 10px;
            gap: 8px;
            background: #ffffff;
            min-height: 100vh;
        }
        
        .message {
            max-width: 80%;
            padding: 10px 14px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
        }
        
        .message.received {
            align-self: flex-start;
            background-color: #f1f1f1;
            color: var(--text-color);
            border-radius: 18px 18px 18px 4px;
        }
        
        .message.sent {
            align-self: flex-end;
            background-color: var(--primary-color);
            color: #ffffff;
            border-radius: 18px 18px 4px 18px;
        }
        
        .message-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
            display: block;
            text-align: left;
        }
        
        .message.sent .message-time {
            text-align: right;
        }
        
        .chat-media {
            width: 200px;
            height: 150px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            background: #000;
            margin-top: 5px;
            cursor: pointer;
        }
        
        .chat-media video, .chat-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .chat-audio {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 180px;
            padding: 5px 0;
        }
        
        .audio-icon {
            font-size: 20px;
            cursor: pointer;
        }
        
        .chat-input-area {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #fff;
            padding: 10px 15px calc(10px + var(--safe-area-bottom));
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid var(--border-color);
            z-index: 1000;
        }
        
        .chat-input {
            flex: 1;
            background: #f8f8f8;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 15px;
            max-height: 100px;
            overflow-y: auto;
            resize: none;
        }
        
        .chat-action-btn {
            color: var(--primary-color);
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            display: flex;
            align-items: center;
        }
        
        .recording-active {
            color: var(--error-color);
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            50% { opacity: 0.4; }
        }
        
        #record-indicator {
            position: fixed;
            bottom: 80px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 1001;
        }
        
        .loading-messages {
            text-align: center;
            padding: 50px;
            color: var(--secondary-text);
        }
        
        .loading-messages i {
            font-size: 30px;
            margin-bottom: 10px;
            color: var(--primary-color);
        }
        
        .empty-chat {
            text-align: center;
            padding: 50px;
            color: var(--secondary-text);
        }
        
        .empty-chat i {
            font-size: 50px;
            margin-bottom: 15px;
            opacity: 0.3;
        }
        
        .typing-indicator {
            font-size: 12px;
            color: var(--primary-color);
            margin-right: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-actions" onclick="goBack()">
            <i class="fa-solid fa-chevron-right" style="font-size: 20px; color: var(--text-color); cursor: pointer;"></i>
        </div>
        <div id="chat-user-info" style="display: flex; align-items: center; gap: 10px; cursor: pointer;" onclick="goToProfile()">
            <img src="images/profile.png" id="chat-avatar" class="user-avatar" style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover;">
            <div style="display: flex; flex-direction: column;">
                <span id="chat-display-name" style="font-weight: bold; font-size: 15px;">جاري التحميل...</span>
                <span id="chat-username" style="font-size: 11px; color: var(--secondary-text);">@...</span>
            </div>
        </div>
        <div style="width: 20px;"></div>
    </header>

    <main class="chat-container" id="chat-box">
        <div class="loading-messages" id="loading-messages">
            <i class="fa-solid fa-circle-notch fa-spin"></i>
            <p>جاري تحميل المحادثة...</p>
        </div>
        
        <div class="empty-chat" id="empty-chat" style="display: none;">
            <i class="fa-regular fa-message"></i>
            <p>لا توجد رسائل بعد</p>
            <p style="font-size: 13px;">ابدأ المحادثة الآن</p>
        </div>
    </main>

    <div class="chat-input-area">
        <label for="chat-media-input" class="chat-action-btn">
            <i class="fa-solid fa-plus"></i>
        </label>
        <input type="file" id="chat-media-input" hidden accept="image/*,video/*">

        <textarea id="chat-input-text" class="chat-input" placeholder="اكتب رسالة..." rows="1"></textarea>

        <div id="chat-main-action" class="chat-action-btn">
            <i id="mic-icon" class="fa-solid fa-microphone"></i>
            <i id="send-icon" class="fa-solid fa-paper-plane" style="display: none;"></i>
        </div>
    </div>

    <div id="record-indicator" style="display: none;">
        <i class="fa-solid fa-microphone" style="color: var(--error-color);"></i>
        <span id="chat-record-timer">00:00</span>
    </div>

    <div id="msg" class="snackbar"></div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <script src="js/ui.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZj9QplNw-VmwSl8Ijv_b6nIi4ghcHDms",
            authDomain: "aulobylemmouchi.firebaseapp.com",
            databaseURL: "https://aulobylemmouchi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aulobylemmouchi",
            storageBucket: "aulobylemmouchi.firebasestorage.app",
            messagingSenderId: "63959796567",
            appId: "1:63959796567:web:5cb2b14ca64cc01b6d4c12"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        const cloudName = "daxh9u5dc";
        const uploadPreset = "aulobylemmouchi";

        let currentUser = null;
        let otherUserId = null;
        let otherUserData = null;
        let currentChatId = null;
        let messagesListener = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let recordingTimer = null;
        let recordingSeconds = 0;

        const chatBox = document.getElementById('chat-box');
        const chatInput = document.getElementById('chat-input-text');
        const sendIcon = document.getElementById('send-icon');
        const micIcon = document.getElementById('mic-icon');
        const chatMainAction = document.getElementById('chat-main-action');
        const recordIndicator = document.getElementById('record-indicator');
        const chatTimer = document.getElementById('chat-record-timer');
        const mediaInput = document.getElementById('chat-media-input');
        const loadingMessages = document.getElementById('loading-messages');
        const emptyChat = document.getElementById('empty-chat');

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            return `${hours}:${minutes}`;
        }

        function goBack() {
            window.location.href = 'chatmain.html';
        }

        function goToProfile() {
            if (otherUserId) {
                window.location.href = `profile.html?id=${otherUserId}`;
            }
        }

        function getUserIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        async function loadChatUserInfo() {
            const user = auth.currentUser;
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            currentUser = user;
            otherUserId = getUserIdFromUrl();

            if (!otherUserId) {
                Aulo.snackbar('لم يتم تحديد مستخدم', { type: 'error' });
                setTimeout(() => window.location.href = 'chatmain.html', 2000);
                return;
            }

            if (otherUserId === currentUser.uid) {
                Aulo.snackbar('لا يمكنك الدردشة مع نفسك', { type: 'error' });
                setTimeout(() => window.location.href = 'chatmain.html', 2000);
                return;
            }

            try {
                const userSnapshot = await database.ref(`users/${otherUserId}`).once('value');
                otherUserData = userSnapshot.val();

                if (!otherUserData) {
                    Aulo.snackbar('المستخدم غير موجود', { type: 'error' });
                    setTimeout(() => window.location.href = 'chatmain.html', 2000);
                    return;
                }

                document.getElementById('chat-display-name').textContent = 
                    otherUserData.displayName || otherUserData.username || 'مستخدم';
                document.getElementById('chat-username').textContent = 
                    `@${otherUserData.username || 'username'}`;
                document.getElementById('chat-avatar').src = 
                    otherUserData.avatar || 'images/profile.png';

                const chatId = [currentUser.uid, otherUserId].sort().join('_');
                currentChatId = chatId;

                await database.ref(`chats/${chatId}`).set({
                    participants: {
                        [currentUser.uid]: true,
                        [otherUserId]: true
                    },
                    lastMessage: '',
                    lastMessageTime: Date.now(),
                    createdAt: Date.now()
                });

                loadMessages();

            } catch (error) {
                console.error('Error loading chat user:', error);
                Aulo.snackbar('خطأ في تحميل معلومات المستخدم', { type: 'error' });
            }
        }

        function loadMessages() {
            if (!currentChatId || !currentUser) return;

            if (messagesListener) {
                database.ref(`messages/${currentChatId}`).off('value', messagesListener);
            }

            messagesListener = database.ref(`messages/${currentChatId}`)
                .orderByChild('timestamp')
                .limitToLast(50)
                .on('value', (snapshot) => {
                    
                    loadingMessages.style.display = 'none';
                    
                    const messages = [];
                    snapshot.forEach((child) => {
                        messages.push({ id: child.key, ...child.val() });
                    });

                    if (messages.length === 0) {
                        emptyChat.style.display = 'block';
                        chatBox.innerHTML = '';
                        chatBox.appendChild(emptyChat);
                        return;
                    }

                    emptyChat.style.display = 'none';
                    chatBox.innerHTML = '';

                    messages.forEach(message => {
                        const messageElement = createMessageElement(message);
                        chatBox.appendChild(messageElement);
                    });

                    setTimeout(() => {
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }, 100);

                    markMessagesAsRead();
                });
        }

        function createMessageElement(message) {
            const isSent = message.senderId === currentUser.uid;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            
            let contentHTML = '';
            
            if (message.type === 'text') {
                contentHTML = message.content;
            } else if (message.type === 'image') {
                contentHTML = `
                    <div class="chat-media" onclick="window.open('${message.content}', '_blank')">
                        <img src="${message.content}" alt="صورة">
                        <div class="play-overlay"><i class="fa-solid fa-magnifying-glass-plus"></i></div>
                    </div>
                `;
            } else if (message.type === 'video') {
                contentHTML = `
                    <div class="chat-media" onclick="playVideo(this, '${message.content}')">
                        <video src="${message.content}" preload="metadata"></video>
                        <div class="play-overlay"><i class="fa-solid fa-circle-play"></i></div>
                    </div>
                `;
            } else if (message.type === 'audio') {
                contentHTML = `
                    <div class="chat-audio">
                        <i class="fa-solid fa-circle-play audio-icon" onclick="this.nextElementSibling.play()"></i>
                        <audio src="${message.content}" preload="none"></audio>
                        <span>تسجيل صوتي</span>
                    </div>
                `;
            }
            
            const timeHTML = `<span class="message-time">${formatTime(message.timestamp)}</span>`;
            
            messageDiv.innerHTML = contentHTML + timeHTML;
            
            return messageDiv;
        }

        window.playVideo = (element, src) => {
            const video = document.createElement('video');
            video.src = src;
            video.controls = true;
            video.autoplay = true;
            video.style.width = '100%';
            video.style.height = '100%';
            video.style.objectFit = 'contain';
            
            element.innerHTML = '';
            element.appendChild(video);
        };

        async function markMessagesAsRead() {
            if (!currentChatId || !currentUser) return;

            try {
                const snapshot = await database.ref(`messages/${currentChatId}`)
                    .orderByChild('read')
                    .equalTo(false)
                    .once('value');

                const updates = {};
                snapshot.forEach((child) => {
                    const message = child.val();
                    if (message.senderId !== currentUser.uid) {
                        updates[`messages/${currentChatId}/${child.key}/read`] = true;
                    }
                });

                if (Object.keys(updates).length > 0) {
                    await database.ref().update(updates);
                }
            } catch (error) {
                console.error('Error marking messages as read:', error);
            }
        }

        async function sendTextMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            const messageData = {
                id: database.ref(`messages/${currentChatId}`).push().key,
                senderId: currentUser.uid,
                type: 'text',
                content: text,
                timestamp: Date.now(),
                read: false
            };

            try {
                await database.ref(`messages/${currentChatId}/${messageData.id}`).set(messageData);
                await database.ref(`chats/${currentChatId}`).update({
                    lastMessage: text,
                    lastMessageTime: Date.now(),
                    lastSenderId: currentUser.uid
                });

                await database.ref(`notifications/${otherUserId}`).push({
                    type: 'chat',
                    chatId: currentChatId,
                    userId: currentUser.uid,
                    message: text,
                    timestamp: Date.now(),
                    read: false
                });

                chatInput.value = '';
                chatInput.style.height = 'auto';
                sendIcon.style.display = 'none';
                micIcon.style.display = 'block';

                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (error) {
                console.error('Error sending message:', error);
                Aulo.snackbar('خطأ في إرسال الرسالة', { type: 'error' });
            }
        }

        async function toggleAudioRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                clearInterval(recordingTimer);
                recordIndicator.style.display = 'none';
                
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = (e) => {
                        audioChunks.push(e.data);
                    };
                    
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        
                        try {
                            Aulo.snackbar('جاري رفع التسجيل...');
                            
                            const formData = new FormData();
                            formData.append('file', audioBlob);
                            formData.append('upload_preset', uploadPreset);
                            formData.append('folder', 'aulobylemmouchi/chat/audio');
                            formData.append('resource_type', 'video');
                            
                            const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/video/upload`, {
                                method: 'POST',
                                body: formData
                            });
                            
                            const data = await response.json();
                            
                            const messageData = {
                                id: database.ref(`messages/${currentChatId}`).push().key,
                                senderId: currentUser.uid,
                                type: 'audio',
                                content: data.secure_url,
                                timestamp: Date.now(),
                                read: false
                            };
                            
                            await database.ref(`messages/${currentChatId}/${messageData.id}`).set(messageData);
                            
                            await database.ref(`chats/${currentChatId}`).update({
                                lastMessage: '🎤 تسجيل صوتي',
                                lastMessageTime: Date.now(),
                                lastSenderId: currentUser.uid
                            });
                            
                            Aulo.snackbar('تم إرسال التسجيل', { type: 'success' });
                            
                        } catch (error) {
                            console.error('Error uploading audio:', error);
                            Aulo.snackbar('خطأ في رفع التسجيل', { type: 'error' });
                        }
                    };
                    
                    mediaRecorder.start();
                    recordIndicator.style.display = 'block';
                    recordingSeconds = 0;
                    chatTimer.textContent = '00:00';
                    
                    recordingTimer = setInterval(() => {
                        recordingSeconds++;
                        const mins = Math.floor(recordingSeconds / 60);
                        const secs = recordingSeconds % 60;
                        chatTimer.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                    }, 1000);
                    
                } catch (error) {
                    console.error('Error accessing microphone:', error);
                    Aulo.snackbar('لا يمكن الوصول إلى الميكروفون', { type: 'error' });
                }
            }
        }

        mediaInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const type = file.type.startsWith('image/') ? 'image' : 'video';
            
            if (file.size > 10 * 1024 * 1024) {
                Aulo.snackbar('الملف كبير جداً (الحد الأقصى 10 ميجابايت)', { type: 'error' });
                return;
            }

            try {
                Aulo.snackbar('جاري رفع الملف...');
                
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', uploadPreset);
                formData.append('folder', `aulobylemmouchi/chat/${type}`);
                
                const resourceType = type === 'image' ? 'image' : 'video';
                
                const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/${resourceType}/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                const messageData = {
                    id: database.ref(`messages/${currentChatId}`).push().key,
                    senderId: currentUser.uid,
                    type: type,
                    content: data.secure_url,
                    timestamp: Date.now(),
                    read: false
                };
                
                await database.ref(`messages/${currentChatId}/${messageData.id}`).set(messageData);
                
                await database.ref(`chats/${currentChatId}`).update({
                    lastMessage: type === 'image' ? '📷 صورة' : '🎥 فيديو',
                    lastMessageTime: Date.now(),
                    lastSenderId: currentUser.uid
                });
                
                Aulo.snackbar('تم إرسال الملف', { type: 'success' });
                mediaInput.value = '';
                
            } catch (error) {
                console.error('Error uploading media:', error);
                Aulo.snackbar('خطأ في رفع الملف', { type: 'error' });
            }
        });

        chatInput.addEventListener('input', () => {
            if (chatInput.value.trim().length > 0) {
                sendIcon.style.display = 'block';
                micIcon.style.display = 'none';
            } else {
                sendIcon.style.display = 'none';
                micIcon.style.display = 'block';
            }
            
            chatInput.style.height = 'auto';
            chatInput.style.height = chatInput.scrollHeight + 'px';
        });

        chatMainAction.addEventListener('click', () => {
            if (chatInput.value.trim().length > 0) {
                sendTextMessage();
            } else {
                toggleAudioRecording();
            }
        });

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (chatInput.value.trim().length > 0) {
                    sendTextMessage();
                }
            }
        });

        window.addEventListener('beforeunload', () => {
            if (messagesListener && currentChatId) {
                database.ref(`messages/${currentChatId}`).off('value', messagesListener);
            }
        });

        auth.onAuthStateChanged((user) => {
            if (user) {
                loadChatUserInfo();
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
