<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aulo - تسجيل الدخول</title>
    
    <!-- Preconnect للخدمات الخارجية -->
    <link rel="preconnect" href="https://aulobylemmouchi-default-rtdb.europe-west1.firebasedatabase.app">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="dns-prefetch" href="https://firebase.googleapis.com">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/l.png">
    
    <!-- Font Awesome متأخر -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></noscript>
    
    <style>
        /* تنسيقات أساسية للسرعة */
        :root {
            --primary-color: #a018cb;
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --secondary-text: #757575;
            --border-color: #f0f0f0;
            --error-color: #ff3b30;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            direction: rtl;
        }
        
        .auth-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        
        .auth-logo { width: 120px; margin-bottom: 30px; }
        .auth-form { width: 100%; max-width: 350px; }
        .input-group { margin-bottom: 15px; }
        
        input, textarea {
            width: 100%;
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            font-family: inherit;
        }
        
        input:focus, textarea:focus { border-color: var(--primary-color); }
        
        .btn-primary {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }
        
        .btn-primary:disabled {
            background: #e0e0e0;
            color: #a0a0a0;
            cursor: not-allowed;
        }
        
        .btn-primary:not(:disabled):active { opacity: 0.8; }
        
        .auth-footer {
            margin-top: 25px;
            font-size: 14px;
            color: var(--secondary-text);
            text-align: center;
        }
        
        .toggle-auth {
            color: var(--primary-color);
            font-weight: 700;
            cursor: pointer;
        }
        
        .extra-fields { display: none; animation: fadeIn 0.3s; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .gender-options { display: flex; gap: 15px; margin-top: 5px; }
        
        .gender-option {
            flex: 1;
            text-align: center;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .gender-option.selected {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        
        .snackbar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            display: none;
            z-index: 2000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="auth-container">
        <img src="images/logo.png" alt="Aulo" class="auth-logo" loading="lazy">
        
        <div class="auth-form">
            <h2 style="margin-bottom: 20px; text-align: center;">مرحباً بك في Aulo</h2>
            
            <div class="input-group">
                <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="off">
            </div>
            
            <div class="input-group">
                <input type="password" id="password" placeholder="كلمة السر">
            </div>
            
            <div class="extra-fields" id="signupFields">
                <div class="input-group">
                    <input type="date" id="birthdate">
                </div>
                
                <div class="input-group">
                    <label style="font-size: 14px; color: var(--secondary-text); display: block; margin-bottom: 5px;">الجنس</label>
                    <div class="gender-options">
                        <div class="gender-option" onclick="selectGender('male')" id="genderMale">ذكر</div>
                        <div class="gender-option" onclick="selectGender('female')" id="genderFemale">أنثى</div>
                    </div>
                </div>
                
                <div class="input-group">
                    <input type="text" id="displayName" placeholder="الاسم المعروض (اختياري)">
                </div>
                
                <div class="input-group">
                    <textarea id="bio" placeholder="نبذة عنك (اختياري)" rows="2"></textarea>
                </div>
            </div>
            
            <button id="authBtn" class="btn-primary" disabled>
                <span id="btnText">دخول</span>
                <span id="btnSpinner" class="loading-spinner" style="display: none;"></span>
            </button>
            
            <div class="auth-footer">
                ليس لديك حساب؟ 
                <span class="toggle-auth" onclick="toggleAuth()">إنشاء حساب جديد</span>
            </div>
        </div>
    </div>
    
    <div id="snackbar" class="snackbar"></div>
    
    <!-- تحميل Firebase بعد الصفحة -->
    <script defer src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    
    <!-- ملفاتنا المحسنة -->
    <script defer src="js/firebase-config.js"></script>
    <script>
        // ==================== متغيرات عامة ====================
        let currentMode = 'login';
        let selectedGender = '';
        let avatarFile = null;
        
        // ==================== دوال مساعدة ====================
        function showMessage(text, isError = false) {
            const msg = document.getElementById('snackbar');
            msg.textContent = text;
            msg.style.background = isError ? '#ff3b30' : '#333';
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }
        
        function setLoading(isLoading) {
            const btn = document.getElementById('authBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            
            btn.disabled = isLoading;
            btnText.style.display = isLoading ? 'none' : 'inline';
            btnSpinner.style.display = isLoading ? 'inline-block' : 'none';
        }
        
        function selectGender(gender) {
            selectedGender = gender;
            document.querySelectorAll('.gender-option').forEach(opt => 
                opt.classList.remove('selected')
            );
            document.getElementById(gender === 'male' ? 'genderMale' : 'genderFemale')
                .classList.add('selected');
            validateInputs();
        }
        
        function toggleAuth() {
            currentMode = currentMode === 'login' ? 'signup' : 'login';
            document.querySelector('h2').textContent = 
                currentMode === 'login' ? 'مرحباً بك في Aulo' : 'انضم إلى Aulo';
            document.getElementById('btnText').textContent = 
                currentMode === 'login' ? 'دخول' : 'إنشاء الحساب';
            document.getElementById('signupFields').style.display = 
                currentMode === 'login' ? 'none' : 'block';
            document.querySelector('.auth-footer').innerHTML = 
                currentMode === 'login' 
                    ? 'ليس لديك حساب؟ <span class="toggle-auth" onclick="toggleAuth()">إنشاء حساب جديد</span>'
                    : 'لديك حساب بالفعل؟ <span class="toggle-auth" onclick="toggleAuth()">تسجيل الدخول</span>';
            
            selectedGender = '';
            document.querySelectorAll('.gender-option').forEach(opt => opt.classList.remove('selected'));
            document.getElementById('birthdate').value = '';
            document.getElementById('displayName').value = '';
            document.getElementById('bio').value = '';
            validateInputs();
        }
        
        function validateInputs() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (currentMode === 'login') {
                document.getElementById('authBtn').disabled = !(username.length >= 3 && password.length >= 6);
            } else {
                const birthdate = document.getElementById('birthdate').value;
                document.getElementById('authBtn').disabled = !(
                    username.length >= 3 && 
                    password.length >= 6 && 
                    birthdate && 
                    selectedGender
                );
            }
        }
        
        document.getElementById('username').addEventListener('input', validateInputs);
        document.getElementById('password').addEventListener('input', validateInputs);
        document.getElementById('birthdate')?.addEventListener('change', validateInputs);
        
        // ==================== تسجيل الدخول ====================
        async function handleLogin(username, password) {
            try {
                setLoading(true);
                
                const usersRef = database.ref('users');
                const snapshot = await usersRef.orderByChild('username').equalTo(username).once('value');
                
                let userEmail = null;
                let userId = null;
                
                snapshot.forEach(child => {
                    userEmail = child.val().email;
                    userId = child.key;
                });
                
                if (!userEmail) {
                    throw new Error('اسم المستخدم غير موجود');
                }
                
                await auth.signInWithEmailAndPassword(userEmail, password);
                
                if (userId) {
                    await database.ref(`users/${userId}`).update({
                        lastSeen: Date.now(),
                        online: true
                    });
                }
                
                showMessage('تم تسجيل الدخول بنجاح');
                setTimeout(() => window.location.href = 'main.html', 1000);
                
            } catch (error) {
                console.error('Login error:', error);
                showMessage(error.message, true);
                setLoading(false);
            }
        }
        
        // ==================== إنشاء حساب ====================
        async function handleSignup(username, password) {
            try {
                setLoading(true);
                
                const usersRef = database.ref('users');
                const snapshot = await usersRef.orderByChild('username').equalTo(username).once('value');
                
                if (snapshot.exists()) {
                    throw new Error('اسم المستخدم موجود بالفعل');
                }
                
                const email = `${username}@${username}.app`;
                const result = await auth.createUserWithEmailAndPassword(email, password);
                const user = result.user;
                
                const userData = {
                    uid: user.uid,
                    username,
                    email,
                    displayName: document.getElementById('displayName').value.trim() || username,
                    bio: document.getElementById('bio').value.trim() || '',
                    gender: selectedGender,
                    birthdate: document.getElementById('birthdate').value,
                    avatar: 'images/profile.png',
                    createdAt: Date.now(),
                    lastSeen: Date.now(),
                    online: true,
                    postsCount: 0,
                    likesCount: 0,
                    privacy: 'public'
                };
                
                await database.ref(`users/${user.uid}`).set(userData);
                
                showMessage('تم إنشاء الحساب بنجاح');
                setTimeout(() => window.location.href = 'main.html', 1000);
                
            } catch (error) {
                console.error('Signup error:', error);
                showMessage(error.message, true);
                setLoading(false);
            }
        }
        
        // ==================== معالج النقر على الزر ====================
        document.getElementById('authBtn').addEventListener('click', async () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!username || !password) {
                showMessage('الرجاء إدخال جميع الحقول المطلوبة', true);
                return;
            }
            
            if (currentMode === 'login') {
                await handleLogin(username, password);
            } else {
                const birthdate = document.getElementById('birthdate').value;
                if (!birthdate) {
                    showMessage('الرجاء إدخال تاريخ الميلاد', true);
                    return;
                }
                
                if (!selectedGender) {
                    showMessage('الرجاء اختيار الجنس', true);
                    return;
                }
                
                await handleSignup(username, password);
            }
        });
        
        // ==================== التحقق من تسجيل الدخول ====================
        auth.onAuthStateChanged(user => {
            if (user) {
                window.location.href = 'main.html';
            }
        });
    </script>
</body>
</html>
