<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" type="image/png" href="images/l.png">
    <link rel="stylesheet" href="css/style.css">
	<!-- أيقونات بأحجام مختلفة -->
	<link rel="icon" type="image/png" sizes="16x16" href="images/l.png">
	<link rel="icon" type="image/png" sizes="32x32" href="images/l.png">
	<link rel="apple-touch-icon" href="images/l.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aulo - نشر جديد</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .post-area {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #post-text {
            border: none;
            resize: none;
            font-size: 18px;
            min-height: 150px;
            background: transparent;
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        #post-text:focus {
            outline: none;
        }
        .media-preview-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding: 5px;
        }
        .preview-item {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 8px;
            overflow: hidden;
        }
        .preview-item img,
        .preview-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .remove-media {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--error-color);
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            border: 2px solid white;
            z-index: 10;
        }
        .post-toolbar {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px 10px;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }
        .toolbar-icon {
            font-size: 24px;
            color: var(--secondary-text);
            cursor: pointer;
            transition: 0.2s;
        }
        .toolbar-icon:hover {
            color: var(--primary-color);
        }
        .record-active {
            color: var(--error-color) !important;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% { opacity: 0.5; }
        }
        #record-timer {
            font-size: 14px;
            color: var(--secondary-text);
            margin-right: 5px;
        }
        .audio-preview {
            background: #f8f8f8;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="images/logo.png" alt="Aulo" onclick="location.href='main.html'">
        </div>
        <div style="font-weight: bold; font-size: 16px;">منشور جديد</div>
        <div style="width: 35px;"></div>
    </header>

    <main class="container">
        <div class="post-area">
            <textarea id="post-text" placeholder="ماذا يدور في ذهنك؟"></textarea>
            
            <div id="media-preview" class="media-preview-container"></div>

            <div class="post-toolbar">
                <label for="img-input">
                    <i class="fa-regular fa-image toolbar-icon"></i>
                </label>
                <input type="file" id="img-input" accept="image/*" multiple hidden>

                <label for="video-input">
                    <i class="fa-solid fa-clapperboard toolbar-icon"></i>
                </label>
                <input type="file" id="video-input" accept="video/*" hidden>

                <div id="record-btn" class="toolbar-icon" style="display: flex; align-items: center;">
                    <i class="fa-solid fa-microphone"></i>
                    <span id="record-timer" style="display: none; margin-right: 5px;">00:00</span>
                </div>
            </div>

            <button id="publish-btn" class="btn-primary" disabled>نشر</button>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="main.html" class="nav-item"><i class="fa-solid fa-house"></i></a>
        <a href="find.html" class="nav-item"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a href="post.html" class="nav-item active"><i class="fa-solid fa-plus-square"></i></a>
        <a href="chatmain.html" class="nav-item"><i class="fa-solid fa-paper-plane"></i></a>
        <a href="myprofile.html" class="nav-item"><i class="fa-solid fa-user"></i></a>
    </nav>

    <div id="msg" class="snackbar"></div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>
    <script src="js/ui.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZj9QplNw-VmwSl8Ijv_b6nIi4ghcHDms",
            authDomain: "aulobylemmouchi.firebaseapp.com",
            databaseURL: "https://aulobylemmouchi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aulobylemmouchi",
            storageBucket: "aulobylemmouchi.firebasestorage.app",
            messagingSenderId: "63959796567",
            appId: "1:63959796567:web:5cb2b14ca64cc01b6d4c12"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        const cloudName = "daxh9u5dc";
        const uploadPreset = "aulobylemmouchi";

        let currentUser = null;
        let selectedFiles = [];
        let audioBlob = null;
        let mediaRecorder = null;
        let recordingTimer = null;
        let recordingSeconds = 0;

        const postText = document.getElementById('post-text');
        const publishBtn = document.getElementById('publish-btn');
        const mediaPreview = document.getElementById('media-preview');
        const imgInput = document.getElementById('img-input');
        const videoInput = document.getElementById('video-input');
        const recordBtn = document.getElementById('record-btn');
        const recordTimer = document.getElementById('record-timer');

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updatePublishButton() {
            const text = postText.value.trim();
            publishBtn.disabled = !(text.length > 0 || selectedFiles.length > 0 || audioBlob);
        }

        postText.addEventListener('input', updatePublishButton);

        imgInput.addEventListener('change', (e) => {
            handleFiles(e.target.files, 'image');
        });

        videoInput.addEventListener('change', (e) => {
            handleFiles(e.target.files, 'video');
        });

        function handleFiles(files, type) {
            if (!files || files.length === 0) return;
            
            if (selectedFiles.length + files.length > 5) {
                Aulo.snackbar('يمكنك اختيار 5 ملفات كحد أقصى', { type: 'error' });
                return;
            }
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                
                if (file.size > 10 * 1024 * 1024) {
                    Aulo.snackbar('الملف كبير جداً (الحد الأقصى 10 ميجابايت)', { type: 'error' });
                    continue;
                }
                
                const fileIndex = selectedFiles.length;
                selectedFiles.push({ file, type });
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    const previewItem = document.createElement('div');
                    previewItem.className = 'preview-item';
                    previewItem.dataset.index = fileIndex;
                    
                    const media = document.createElement(type === 'video' ? 'video' : 'img');
                    media.src = e.target.result;
                    if (type === 'video') media.controls = true;
                    
                    const removeBtn = document.createElement('div');
                    removeBtn.className = 'remove-media';
                    removeBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
                    removeBtn.onclick = () => removeFile(fileIndex);
                    
                    previewItem.appendChild(media);
                    previewItem.appendChild(removeBtn);
                    mediaPreview.appendChild(previewItem);
                };
                reader.readAsDataURL(file);
            }
            
            updatePublishButton();
        }

        window.removeFile = (index) => {
            selectedFiles.splice(index, 1);
            mediaPreview.innerHTML = '';
            selectedFiles.forEach((item, i) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const previewItem = document.createElement('div');
                    previewItem.className = 'preview-item';
                    previewItem.dataset.index = i;
                    
                    const media = document.createElement(item.type === 'video' ? 'video' : 'img');
                    media.src = e.target.result;
                    if (item.type === 'video') media.controls = true;
                    
                    const removeBtn = document.createElement('div');
                    removeBtn.className = 'remove-media';
                    removeBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
                    removeBtn.onclick = () => removeFile(i);
                    
                    previewItem.appendChild(media);
                    previewItem.appendChild(removeBtn);
                    mediaPreview.appendChild(previewItem);
                };
                reader.readAsDataURL(item.file);
            });
            updatePublishButton();
        };

        recordBtn.addEventListener('click', toggleRecording);

        async function toggleRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                recordBtn.classList.remove('record-active');
                recordTimer.style.display = 'none';
                clearInterval(recordingTimer);
                
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    const chunks = [];
                    
                    mediaRecorder.ondataavailable = (e) => {
                        chunks.push(e.data);
                    };
                    
                    mediaRecorder.onstop = () => {
                        audioBlob = new Blob(chunks, { type: 'audio/webm' });
                        
                        const previewItem = document.createElement('div');
                        previewItem.className = 'preview-item';
                        
                        const audioPreview = document.createElement('div');
                        audioPreview.className = 'audio-preview';
                        audioPreview.innerHTML = `
                            <i class="fa-solid fa-circle-play" style="color: var(--primary-color); font-size: 24px;"></i>
                            <span>تسجيل صوتي (${formatTime(recordingSeconds)})</span>
                        `;
                        
                        const removeBtn = document.createElement('div');
                        removeBtn.className = 'remove-media';
                        removeBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
                        removeBtn.onclick = () => {
                            audioBlob = null;
                            previewItem.remove();
                            updatePublishButton();
                        };
                        
                        previewItem.appendChild(audioPreview);
                        previewItem.appendChild(removeBtn);
                        mediaPreview.appendChild(previewItem);
                        
                        recordingSeconds = 0;
                        updatePublishButton();
                    };
                    
                    mediaRecorder.start();
                    recordBtn.classList.add('record-active');
                    recordTimer.style.display = 'inline';
                    recordingSeconds = 0;
                    
                    recordingTimer = setInterval(() => {
                        recordingSeconds++;
                        recordTimer.textContent = formatTime(recordingSeconds);
                    }, 1000);
                    
                } catch (error) {
                    console.error('Error accessing microphone:', error);
                    Aulo.snackbar('لا يمكن الوصول إلى الميكروفون', { type: 'error' });
                }
            }
        }

        async function uploadToCloudinary(file, type) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', uploadPreset);
            formData.append('folder', 'aulobylemmouchi/posts');
            
            const resourceType = type === 'video' ? 'video' : 'image';
            
            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/${resourceType}/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) throw new Error('فشل الرفع');
                const data = await response.json();
                return {
                    type: type,
                    url: data.secure_url,
                    publicId: data.public_id
                };
            } catch (error) {
                console.error('Upload error:', error);
                throw error;
            }
        }

        async function uploadAudioToCloudinary(blob) {
            const formData = new FormData();
            formData.append('file', blob);
            formData.append('upload_preset', uploadPreset);
            formData.append('folder', 'aulobylemmouchi/posts/audio');
            formData.append('resource_type', 'video');
            
            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/video/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) throw new Error('فشل رفع الصوت');
                const data = await response.json();
                return {
                    type: 'audio',
                    url: data.secure_url,
                    publicId: data.public_id
                };
            } catch (error) {
                console.error('Audio upload error:', error);
                throw error;
            }
        }

        publishBtn.addEventListener('click', async () => {
            const user = auth.currentUser;
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            const text = postText.value.trim();
            if (!text && selectedFiles.length === 0 && !audioBlob) {
                Aulo.snackbar('الرجاء إدخال نص أو إضافة وسائط', { type: 'error' });
                return;
            }
            
            publishBtn.disabled = true;
            publishBtn.textContent = 'جاري النشر...';
            
            try {
                const media = [];
                
                for (const item of selectedFiles) {
                    try {
                        const uploadedMedia = await uploadToCloudinary(item.file, item.type);
                        media.push(uploadedMedia);
                    } catch (uploadError) {
                        console.error('Error uploading file:', uploadError);
                        Aulo.snackbar('خطأ في رفع الملف', { type: 'error' });
                    }
                }
                
                if (audioBlob) {
                    try {
                        const uploadedAudio = await uploadAudioToCloudinary(audioBlob);
                        media.push(uploadedAudio);
                    } catch (uploadError) {
                        console.error('Error uploading audio:', uploadError);
                    }
                }
                
                const postRef = database.ref('posts').push();
                const postData = {
                    id: postRef.key,
                    userId: user.uid,
                    text: text,
                    media: media,
                    timestamp: Date.now(),
                    likes: 0,
                    comments: 0
                };
                
                await postRef.set(postData);
                
                const userRef = database.ref(`users/${user.uid}`);
                const userSnapshot = await userRef.once('value');
                const userData = userSnapshot.val() || {};
                await userRef.update({
                    postsCount: (userData.postsCount || 0) + 1
                });
                
                Aulo.snackbar('تم النشر بنجاح', { type: 'success' });
                
                setTimeout(() => {
                    window.location.href = 'main.html';
                }, 1000);
                
            } catch (error) {
                console.error('Error publishing post:', error);
                Aulo.snackbar('حدث خطأ في النشر', { type: 'error' });
                publishBtn.disabled = false;
                publishBtn.textContent = 'نشر';
            }
        });

        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
