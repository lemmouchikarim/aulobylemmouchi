<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aulo - الدردشة المشفرة</title>
    <link rel="icon" type="image/png" href="images/l.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- مكتبة التشفير CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* الهيدر */
        .chat-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: white;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 15px;
            border-bottom: 1px solid #eee;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .back-btn {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            color: #666;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #f5f5f5;
        }

        .chat-user-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #a018cb;
        }

        .chat-user-text {
            display: flex;
            flex-direction: column;
        }

        .chat-user-name {
            font-weight: 600;
            font-size: 15px;
            color: #1a1a1a;
        }

        .chat-user-status {
            font-size: 11px;
            color: #757575;
        }

        .online {
            color: #4caf50;
        }

        /* منطقة المحادثة */
        .messages-container {
            position: fixed;
            top: 60px;
            bottom: 70px;
            left: 0;
            right: 0;
            overflow-y: auto;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #f5f5f5;
        }

        /* فاصل التاريخ */
        .date-separator {
            text-align: center;
            margin: 15px 0;
            position: relative;
        }

        .date-separator span {
            background: rgba(0,0,0,0.05);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 11px;
            color: #757575;
            display: inline-block;
        }

        /* فاصل الوقت (بعد ساعة) */
        .time-separator {
            text-align: center;
            margin: 15px 0 10px;
        }

        .time-separator span {
            background: rgba(0,0,0,0.03);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 10px;
            color: #999;
        }

        /* فقاعات الرسائل */
        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 75%;
        }

        .message-wrapper.sent {
            align-self: flex-end;
        }

        .message-wrapper.received {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 12px 16px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .sent .message-bubble {
            background: #a018cb;
            color: white;
            border-radius: 20px 20px 4px 20px;
        }

        .received .message-bubble {
            background: white;
            color: #1a1a1a;
            border-radius: 20px 20px 20px 4px;
        }

        /* أيقونة القفل للرسائل المشفرة */
        .encrypted-icon {
            font-size: 12px;
            margin-left: 4px;
            opacity: 0.8;
        }

        /* الوسائط في الرسائل */
        .media-message {
            max-width: 280px;
            cursor: pointer;
            overflow: hidden;
        }

        .media-message img {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            border-radius: 12px;
            display: block;
        }

        .media-message video {
            width: 100%;
            max-height: 350px;
            border-radius: 12px;
            background: black;
        }

        .audio-message {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 30px;
            min-width: 200px;
        }

        .audio-message i {
            font-size: 28px;
            cursor: pointer;
            color: #a018cb;
        }

        .sent .audio-message i {
            color: white;
        }

        .audio-message span {
            font-size: 13px;
        }

        /* منطقة الإدخال */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #eee;
            padding: 12px 15px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            z-index: 100;
        }

        .attach-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a018cb;
            cursor: pointer;
            font-size: 22px;
            transition: background 0.2s;
        }

        .attach-btn:hover {
            background: #f5f5f5;
        }

        .text-input {
            flex: 1;
            background: #f5f5f5;
            border: none;
            border-radius: 25px;
            padding: 12px 18px;
            font-size: 14px;
            line-height: 1.5;
            max-height: 120px;
            resize: none;
            font-family: inherit;
            transition: background 0.2s;
        }

        .text-input:focus {
            outline: none;
            background: #fff;
            box-shadow: 0 0 0 2px rgba(160,24,203,0.2);
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #a018cb;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: transform 0.2s;
        }

        .send-btn:active {
            transform: scale(0.9);
        }

        .mic-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #f5f5f5;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }

        .mic-btn.recording {
            background: #ff3b30;
            color: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* مؤشر التسجيل */
        .record-indicator {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 200;
            backdrop-filter: blur(5px);
        }

        .record-indicator i {
            color: #ff3b30;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.5; }
        }

        /* حالات التحميل */
        .loading-container {
            text-align: center;
            padding: 40px;
            color: #757575;
        }

        .loading-container i {
            font-size: 30px;
            color: #a018cb;
            margin-bottom: 10px;
        }

        .empty-chat {
            text-align: center;
            padding: 40px;
            color: #757575;
        }

        .empty-chat i {
            font-size: 50px;
            opacity: 0.3;
            margin-bottom: 15px;
        }

        /* تلميح التشفير */
        .encryption-badge {
            position: fixed;
            bottom: 80px;
            right: 15px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 150;
            backdrop-filter: blur(5px);
        }

        .encryption-badge i {
            color: #4caf50;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <!-- الهيدر -->
    <div class="chat-header">
        <div class="back-btn" onclick="goBack()">
            <i class="fa-solid fa-arrow-right"></i>
        </div>
        <div class="chat-user-info" onclick="goToProfile()">
            <img src="images/profile.png" id="chat-avatar" class="chat-avatar">
            <div class="chat-user-text">
                <span id="chat-user-name" class="chat-user-name">جاري التحميل...</span>
                <span id="chat-user-status" class="chat-user-status">...</span>
            </div>
        </div>
        <div style="width: 35px;"></div>
    </div>

    <!-- شارة التشفير -->
    <div class="encryption-badge">
        <i class="fa-solid fa-lock"></i>
        <span>تشفير End-to-End</span>
    </div>

    <!-- منطقة الرسائل -->
    <div class="messages-container" id="messagesContainer">
        <div class="loading-container" id="loadingMessages">
            <i class="fa-solid fa-circle-notch fa-spin"></i>
            <p>جاري تحميل المحادثة...</p>
        </div>
        <div class="empty-chat" id="emptyChat" style="display: none;">
            <i class="fa-regular fa-message"></i>
            <p>لا توجد رسائل بعد</p>
            <p style="font-size: 13px;">أرسل أول رسالة الآن</p>
        </div>
    </div>

    <!-- منطقة الإدخال -->
    <div class="input-area">
        <label for="fileInput" class="attach-btn">
            <i class="fa-solid fa-plus"></i>
        </label>
        <input type="file" id="fileInput" hidden accept="image/*,video/*">

        <textarea id="messageInput" class="text-input" placeholder="اكتب رسالة..." rows="1"></textarea>

        <div id="sendButton" class="send-btn" style="display: none;">
            <i class="fa-solid fa-paper-plane"></i>
        </div>
        <div id="micButton" class="mic-btn">
            <i class="fa-solid fa-microphone"></i>
        </div>
    </div>

    <!-- مؤشر التسجيل -->
    <div id="recordIndicator" class="record-indicator" style="display: none;">
        <i class="fa-solid fa-microphone"></i>
        <span id="recordTimer">00:00</span>
    </div>

    <!-- Snackbar للرسائل -->
    <div id="snackbar" style="position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 8px 20px; border-radius: 25px; font-size: 13px; display: none; z-index: 300;"></div>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>

    <script>
        // ==================== تهيئة Firebase ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBZj9QplNw-VmwSl8Ijv_b6nIi4ghcHDms",
            authDomain: "aulobylemmouchi.firebaseapp.com",
            databaseURL: "https://aulobylemmouchi-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aulobylemmouchi",
            storageBucket: "aulobylemmouchi.firebasestorage.app",
            messagingSenderId: "63959796567",
            appId: "1:63959796567:web:5cb2b14ca64cc01b6d4c12"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        // ==================== تكوين Cloudinary ====================
        const cloudName = "daxh9u5dc";
        const uploadPreset = "aulobylemmouchi";

        // ==================== نظام التشفير End-to-End ====================
        class ChatEncryption {
            constructor(chatId, userId1, userId2) {
                // ترتيب المستخدمين لضمان نفس المفتاح للطرفين
                const users = [userId1, userId2].sort().join('_');
                this.chatKey = CryptoJS.SHA256(chatId + users).toString();
                this.chatId = chatId;
            }
            
            // تشفير الرسالة
            encrypt(text) {
                try {
                    return {
                        encrypted: true,
                        data: CryptoJS.AES.encrypt(text, this.chatKey).toString(),
                        timestamp: Date.now()
                    };
                } catch (error) {
                    console.error('Encryption error:', error);
                    return {
                        encrypted: false,
                        data: text,
                        timestamp: Date.now()
                    };
                }
            }
            
            // فك تشفير الرسالة
            decrypt(encryptedData) {
                try {
                    if (!encryptedData || typeof encryptedData !== 'object') {
                        return encryptedData || '';
                    }
                    
                    if (!encryptedData.encrypted) {
                        return encryptedData.data || encryptedData || '';
                    }
                    
                    const bytes = CryptoJS.AES.decrypt(encryptedData.data, this.chatKey);
                    return bytes.toString(CryptoJS.enc.Utf8);
                } catch (error) {
                    console.error('Decryption error:', error);
                    return '[🔒 رسالة مشفرة]';
                }
            }
        }

        // تخزين كائنات التشفير لكل محادثة
        const encryptionInstances = {};

        // الحصول على كائن التشفير للمحادثة الحالية
        function getEncryption() {
            if (!currentChatId || !currentUser || !otherUserId) return null;
            
            const key = currentChatId;
            if (!encryptionInstances[key]) {
                encryptionInstances[key] = new ChatEncryption(currentChatId, currentUser.uid, otherUserId);
            }
            return encryptionInstances[key];
        }

        // ==================== المتغيرات العامة ====================
        let currentUser = null;
        let otherUserId = null;
        let otherUserData = null;
        let currentChatId = null;
        let messagesListener = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let recordingTimer = null;
        let recordingSeconds = 0;

        // عناصر الصفحة
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const micButton = document.getElementById('micButton');
        const recordIndicator = document.getElementById('recordIndicator');
        const recordTimer = document.getElementById('recordTimer');
        const fileInput = document.getElementById('fileInput');
        const loadingMessages = document.getElementById('loadingMessages');
        const emptyChat = document.getElementById('emptyChat');
        const snackbar = document.getElementById('snackbar');

        // ==================== دوال مساعدة ====================
        function showMessage(text, isError = false) {
            snackbar.textContent = text;
            snackbar.style.background = isError ? '#ff3b30' : '#333';
            snackbar.style.display = 'block';
            setTimeout(() => {
                snackbar.style.display = 'none';
            }, 3000);
        }

        function formatDateForSeparator(timestamp) {
            const date = new Date(timestamp);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            if (date.toDateString() === today.toDateString()) {
                return 'اليوم';
            } else if (date.toDateString() === yesterday.toDateString()) {
                return 'أمس';
            } else {
                return date.toLocaleDateString('ar-SA', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                });
            }
        }

        function formatTimeOnly(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('ar-SA', { 
                hour: '2-digit', 
                minute: '2-digit',
                hour12: true 
            });
        }

        function isMoreThanHour(timestamp1, timestamp2) {
            return Math.abs(timestamp2 - timestamp1) > 60 * 60 * 1000;
        }

        function goBack() {
            window.location.href = 'chatmain.html';
        }

        function goToProfile() {
            if (otherUserId) {
                window.location.href = `profile.html?id=${otherUserId}`;
            }
        }

        function getUserIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        // ==================== تحديث حالة اتصال المستخدم ====================
        function setupOnlineStatus() {
            if (!otherUserId) return;
            
            const userStatusRef = database.ref(`users/${otherUserId}`);
            
            userStatusRef.on('value', (snapshot) => {
                const userData = snapshot.val();
                const statusSpan = document.getElementById('chat-user-status');
                
                if (userData?.online) {
                    statusSpan.textContent = 'متصل';
                    statusSpan.className = 'chat-user-status online';
                } else {
                    if (userData?.lastSeen) {
                        const lastSeen = new Date(userData.lastSeen);
                        const now = new Date();
                        const diff = now - lastSeen;
                        
                        if (diff < 60000) {
                            statusSpan.textContent = 'منذ لحظات';
                        } else if (diff < 3600000) {
                            statusSpan.textContent = `منذ ${Math.floor(diff / 60000)} د`;
                        } else {
                            statusSpan.textContent = 'غير متصل';
                        }
                    } else {
                        statusSpan.textContent = 'غير متصل';
                    }
                    statusSpan.className = 'chat-user-status';
                }
            });
        }

        // ==================== تحميل معلومات المستخدم الآخر ====================
        async function loadChatUserInfo() {
            const user = auth.currentUser;
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            currentUser = user;
            otherUserId = getUserIdFromUrl();

            if (!otherUserId) {
                showMessage('لم يتم تحديد مستخدم', true);
                setTimeout(() => window.location.href = 'chatmain.html', 2000);
                return;
            }

            if (otherUserId === currentUser.uid) {
                showMessage('لا يمكنك الدردشة مع نفسك', true);
                setTimeout(() => window.location.href = 'chatmain.html', 2000);
                return;
            }

            try {
                const userSnapshot = await database.ref(`users/${otherUserId}`).once('value');
                otherUserData = userSnapshot.val();

                if (!otherUserData) {
                    showMessage('المستخدم غير موجود', true);
                    setTimeout(() => window.location.href = 'chatmain.html', 2000);
                    return;
                }

                document.getElementById('chat-user-name').textContent = 
                    otherUserData.displayName || otherUserData.username || 'مستخدم';
                document.getElementById('chat-avatar').src = 
                    otherUserData.avatar || 'images/profile.png';

                const chatId = [currentUser.uid, otherUserId].sort().join('_');
                currentChatId = chatId;

                await database.ref(`chats/${chatId}`).set({
                    participants: {
                        [currentUser.uid]: true,
                        [otherUserId]: true
                    },
                    lastMessage: '',
                    lastMessageTime: Date.now(),
                    createdAt: Date.now()
                });

                setupOnlineStatus();
                loadMessages();

            } catch (error) {
                console.error('Error loading chat user:', error);
                showMessage('خطأ في تحميل معلومات المستخدم', true);
            }
        }

        // ==================== تحميل الرسائل مع دعم التشفير ====================
        function loadMessages() {
            if (!currentChatId || !currentUser) return;

            if (messagesListener) {
                database.ref(`messages/${currentChatId}`).off('value', messagesListener);
            }

            messagesListener = database.ref(`messages/${currentChatId}`)
                .orderByChild('timestamp')
                .limitToLast(100)
                .on('value', (snapshot) => {
                    
                    loadingMessages.style.display = 'none';
                    
                    const messages = [];
                    snapshot.forEach((child) => {
                        messages.push({ id: child.key, ...child.val() });
                    });

                    if (messages.length === 0) {
                        emptyChat.style.display = 'block';
                        messagesContainer.innerHTML = '';
                        messagesContainer.appendChild(emptyChat);
                        return;
                    }

                    emptyChat.style.display = 'none';
                    messagesContainer.innerHTML = '';

                    let lastDate = null;
                    let lastTimestamp = null;

                    messages.forEach((message, index) => {
                        const messageDate = new Date(message.timestamp).toDateString();
                        
                        if (lastDate !== messageDate) {
                            const dateSeparator = document.createElement('div');
                            dateSeparator.className = 'date-separator';
                            dateSeparator.innerHTML = `<span>${formatDateForSeparator(message.timestamp)}</span>`;
                            messagesContainer.appendChild(dateSeparator);
                            lastDate = messageDate;
                        }
                        
                        if (lastTimestamp && isMoreThanHour(lastTimestamp, message.timestamp)) {
                            const timeSeparator = document.createElement('div');
                            timeSeparator.className = 'time-separator';
                            timeSeparator.innerHTML = `<span>${formatTimeOnly(message.timestamp)}</span>`;
                            messagesContainer.appendChild(timeSeparator);
                        }
                        
                        const messageElement = createMessageElement(message);
                        messagesContainer.appendChild(messageElement);
                        
                        lastTimestamp = message.timestamp;
                    });

                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    markMessagesAsRead();
                });
        }

        // ==================== إنشاء عنصر رسالة مع فك التشفير ====================
        function createMessageElement(message) {
            const isSent = message.senderId === currentUser.uid;
            
            // فك تشفير المحتوى إذا كان مشفراً
            let displayContent = message.content;
            let isEncrypted = false;
            
            if (message.content && typeof message.content === 'object' && message.content.encrypted) {
                isEncrypted = true;
                const encryption = getEncryption();
                if (encryption) {
                    displayContent = encryption.decrypt(message.content);
                } else {
                    displayContent = '[🔒 انتظر فك التشفير...]';
                }
            } else if (typeof message.content === 'string') {
                displayContent = message.content;
            }
            
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${isSent ? 'sent' : 'received'}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            
            if (message.type === 'text') {
                // إضافة رمز القفل للرسائل المشفرة
                const lockEmoji = isEncrypted ? '🔒 ' : '';
                bubble.textContent = lockEmoji + displayContent;
            } else if (message.type === 'image') {
                bubble.className = 'media-message';
                bubble.innerHTML = `<img src="${message.content}" alt="صورة" loading="lazy" onclick="window.open('${message.content}', '_blank')">`;
            } else if (message.type === 'video') {
                bubble.className = 'media-message';
                bubble.innerHTML = `
                    <video src="${message.content}" controls preload="metadata">
                        <source src="${message.content}" type="video/mp4">
                    </video>
                `;
            } else if (message.type === 'audio') {
                bubble.className = 'audio-message';
                bubble.innerHTML = `
                    <i class="fa-solid fa-circle-play" onclick="this.nextElementSibling.play()"></i>
                    <audio src="${message.content}" preload="none"></audio>
                    <span>رسالة صوتية</span>
                `;
            }
            
            wrapper.appendChild(bubble);
            return wrapper;
        }

        // ==================== تحديث حالة القراءة ====================
        async function markMessagesAsRead() {
            if (!currentChatId || !currentUser) return;

            try {
                const snapshot = await database.ref(`messages/${currentChatId}`)
                    .orderByChild('read')
                    .equalTo(false)
                    .once('value');

                const updates = {};
                snapshot.forEach((child) => {
                    const message = child.val();
                    if (message.senderId !== currentUser.uid) {
                        updates[`messages/${currentChatId}/${child.key}/read`] = true;
                    }
                });

                if (Object.keys(updates).length > 0) {
                    await database.ref().update(updates);
                }
            } catch (error) {
                console.error('Error marking messages as read:', error);
            }
        }

        // ==================== إرسال رسالة نصية مشفرة ====================
        async function sendTextMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            const encryption = getEncryption();
            const encryptedContent = encryption ? encryption.encrypt(text) : { encrypted: false, data: text };

            const messageData = {
                id: database.ref(`messages/${currentChatId}`).push().key,
                senderId: currentUser.uid,
                type: 'text',
                content: encryptedContent,
                timestamp: Date.now(),
                read: false
            };

            try {
                await database.ref(`messages/${currentChatId}/${messageData.id}`).set(messageData);
                await database.ref(`chats/${currentChatId}`).update({
                    lastMessage: '🔒 رسالة مشفرة',
                    lastMessageTime: Date.now(),
                    lastSenderId: currentUser.uid
                });

                await database.ref(`notifications/${otherUserId}`).push({
                    type: 'chat',
                    chatId: currentChatId,
                    userId: currentUser.uid,
                    message: '🔒 رسالة مشفرة',
                    timestamp: Date.now(),
                    read: false
                });

                messageInput.value = '';
                messageInput.style.height = 'auto';
                messageInput.focus();

            } catch (error) {
                console.error('Error sending message:', error);
                showMessage('خطأ في إرسال الرسالة', true);
            }
        }

        // ==================== تسجيل الصوت ====================
        async function toggleRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                clearInterval(recordingTimer);
                recordIndicator.style.display = 'none';
                micButton.classList.remove('recording');
                
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = (e) => {
                        audioChunks.push(e.data);
                    };
                    
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        
                        try {
                            showMessage('جاري رفع التسجيل...');
                            
                            const formData = new FormData();
                            formData.append('file', audioBlob);
                            formData.append('upload_preset', uploadPreset);
                            formData.append('folder', 'aulobylemmouchi/chat/audio');
                            formData.append('resource_type', 'video');
                            
                            const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/video/upload`, {
                                method: 'POST',
                                body: formData
                            });
                            
                            const data = await response.json();
                            
                            const messageData = {
                                id: database.ref(`messages/${currentChatId}`).push().key,
                                senderId: currentUser.uid,
                                type: 'audio',
                                content: data.secure_url,
                                timestamp: Date.now(),
                                read: false
                            };
                            
                            await database.ref(`messages/${currentChatId}/${messageData.id}`).set(messageData);
                            
                            await database.ref(`chats/${currentChatId}`).update({
                                lastMessage: '🎤 رسالة صوتية',
                                lastMessageTime: Date.now(),
                                lastSenderId: currentUser.uid
                            });
                            
                            showMessage('تم إرسال التسجيل');
                            
                        } catch (error) {
                            console.error('Error uploading audio:', error);
                            showMessage('خطأ في رفع التسجيل', true);
                        }
                    };
                    
                    mediaRecorder.start();
                    recordIndicator.style.display = 'flex';
                    micButton.classList.add('recording');
                    recordingSeconds = 0;
                    recordTimer.textContent = '00:00';
                    
                    recordingTimer = setInterval(() => {
                        recordingSeconds++;
                        const mins = Math.floor(recordingSeconds / 60);
                        const secs = recordingSeconds % 60;
                        recordTimer.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                    }, 1000);
                    
                } catch (error) {
                    console.error('Error accessing microphone:', error);
                    showMessage('لا يمكن الوصول إلى الميكروفون', true);
                }
            }
        }

        // ==================== رفع ملف ====================
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const type = file.type.startsWith('image/') ? 'image' : 'video';
            
            if (file.size > 10 * 1024 * 1024) {
                showMessage('الملف كبير جداً (الحد الأقصى 10 ميجابايت)', true);
                return;
            }

            try {
                showMessage('جاري رفع الملف...');
                
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', uploadPreset);
                formData.append('folder', `aulobylemmouchi/chat/${type}`);
                
                const resourceType = type === 'image' ? 'image' : 'video';
                
                const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/${resourceType}/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                const messageData = {
                    id: database.ref(`messages/${currentChatId}`).push().key,
                    senderId: currentUser.uid,
                    type: type,
                    content: data.secure_url,
                    timestamp: Date.now(),
                    read: false
                };
                
                await database.ref(`messages/${currentChatId}/${messageData.id}`).set(messageData);
                
                await database.ref(`chats/${currentChatId}`).update({
                    lastMessage: type === 'image' ? '📷 صورة' : '🎥 فيديو',
                    lastMessageTime: Date.now(),
                    lastSenderId: currentUser.uid
                });
                
                showMessage('تم إرسال الملف');
                fileInput.value = '';
                
            } catch (error) {
                console.error('Error uploading file:', error);
                showMessage('خطأ في رفع الملف', true);
            }
        });

        // ==================== معالجة إدخال النص ====================
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
            
            if (messageInput.value.trim().length > 0) {
                sendButton.style.display = 'flex';
                micButton.style.display = 'none';
            } else {
                sendButton.style.display = 'none';
                micButton.style.display = 'flex';
            }
        });

        sendButton.addEventListener('click', sendTextMessage);
        micButton.addEventListener('click', toggleRecording);

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (messageInput.value.trim().length > 0) {
                    sendTextMessage();
                }
            }
        });

        window.addEventListener('beforeunload', () => {
            if (messagesListener && currentChatId) {
                database.ref(`messages/${currentChatId}`).off('value', messagesListener);
            }
        });

        auth.onAuthStateChanged((user) => {
            if (user) {
                loadChatUserInfo();
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
